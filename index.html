<meta charset="utf-8">

<title>Zynerio VPN — Connect</title>
<style>

    --text: #e8e8ef;
    --muted: #8888a0;
    --success: #00b894;
    --danger: #e17055;
    --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100dvh; display: flex; align-items: center;

  .container { max-width: 420px; width: 100%; }
  .header { text-align: center; margin-bottom: 24px; }
  .logo { font-size: 48px; margin-bottom: 8px; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 14px; }
  .platform-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(108,92,231,.15); color: var(--accent);
    padding: 6px 14px; border-radius: 20px;
    font-size: 13px; font-weight: 500; margin-top: 12px;
  }
  .scan-card {
    background: var(--card); border-radius: var(--radius);
    padding: 28px 24px; text-align: center; margin-bottom: 16px;
  }
  .scan-emoji { font-size: 40px; margin-bottom: 12px; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
  .scan-msg { font-size: 16px; font-weight: 500; margin-bottom: 6px; min-height: 24px; }
  .scan-detail { font-size: 13px; color: var(--muted); margin-bottom: 14px; min-height: 18px; }
  .progress-wrap { background: rgba(255,255,255,.08); border-radius: 6px; height: 6px; overflow: hidden; }
  .progress-bar { height: 100%; background: var(--accent); border-radius: 6px; transition: width .4s ease; width: 0; }
  .result-card {
    background: var(--card); border-radius: var(--radius);
    padding: 28px 24px; text-align: center; margin-bottom: 16px;
  }
  .result-emoji { font-size: 44px; margin-bottom: 10px; }
  .result-msg { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
  .result-hint { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
  .app-card {
    background: rgba(255,255,255,.04); border-radius: 12px;
    padding: 14px; margin-bottom: 8px; text-align: left;
  }
  .app-card.featured { border: 1px solid rgba(108,92,231,.25); background: rgba(108,92,231,.06); }
  .app-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .app-name { font-size: 15px; font-weight: 600; }
  .app-tag { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px; background: rgba(108,92,231,.2); color: var(--accent); }
  .btn-action {
    display: block; width: 100%; padding: 11px; font-size: 14px; font-weight: 600;
    border: none; border-radius: 10px; cursor: pointer; color: #fff;
    text-decoration: none; text-align: center; transition: transform .1s;
  }
  .btn-action:active { transform: scale(.97); }
  .btn-connect { background: linear-gradient(135deg, var(--success), #00a383); }
  .btn-download { background: var(--accent); margin-bottom: 6px; }
  .btn-row { display: flex; gap: 8px; }
  .btn-row .btn-action { flex: 1; }
  .dl-links { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .dl-link {
    font-size: 12px; color: var(--muted); text-decoration: none;
    padding: 4px 10px; border-radius: 8px; background: rgba(255,255,255,.06); transition: background .2s;
  }
  .dl-link:hover { background: rgba(255,255,255,.12); color: var(--text); }
  .other-toggle {
    display: block; width: 100%; padding: 10px; font-size: 13px; font-weight: 500;
    border: none; border-radius: 12px; cursor: pointer; margin: 8px 0;
    background: transparent; color: var(--accent); border: 1px solid rgba(108,92,231,.2);
  }
  .other-toggle:hover { border-color: rgba(108,92,231,.5); }
  .key-section {
    background: var(--card); border-radius: var(--radius);
    padding: 16px; margin-top: 16px; text-align: center;
  }
  .btn-copy {
    display: block; width: 100%; padding: 12px; font-size: 14px; font-weight: 600;
    border: none; border-radius: 12px; cursor: pointer; color: #fff;
    background: var(--accent); transition: background .2s, transform .1s; margin-bottom: 10px;
  }
  .btn-copy:hover { background: var(--accent-hover); }
  .btn-copy:active { transform: scale(.97); }
  .key-box {
    background: rgba(255,255,255,.06); border-radius: 10px; padding: 10px;
    font-family: "SF Mono", Monaco, Consolas, monospace; font-size: 11px;
    word-break: break-all; color: var(--muted); cursor: pointer;
    max-height: 60px; overflow: hidden;
  }
  .copy-toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);

    border-radius: 10px; font-size: 14px; font-weight: 500;
    opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 100;
  }
  .copy-toast.show { opacity: 1; }
  .hidden { display: none !important; }
  .error-msg { text-align: center; color: var(--danger); margin-top: 20px; }

  function parseRemnaConfig(cfg) {
    var platformApps = cfg && cfg.platforms && cfg.platforms[platform];
    if (!Array.isArray(platformApps) || !platformApps.length) return null;
    var apps = [];
    for (var i = 0; i < platformApps.length; i++) {
      var app = platformApps[i];
      var scheme = app.urlScheme;
      if (!scheme) continue;
      var tpl = scheme + (scheme.charAt(scheme.length-1) === "=" ? "{{ENC}}" : "{{SUB}}");
      var links = [];
      if (app.installationStep && app.installationStep.buttons) {

            links.push({text: txt, link: btn.buttonLink});
          }
        }
      }
      apps.push({name: app.name||app.id, deepLink: tpl, featured: !!app.isFeatured, storeLinks: links});
    }
    apps.sort(function(a,b){return (b.featured?1:0)-(a.featured?1:0);});
    return apps.length ? apps : null;

  function prioritize(apps) {
    if (!appHint || appHint === "_default") return apps;
    var hint = appHint.replace(/[-_\s]/g,"").toLowerCase();
    for (var i=1; i<apps.length; i++) {
      var n = apps[i].name.replace(/[-_\s]/g,"").toLowerCase();
      if (n.indexOf(hint)!==-1 || hint.indexOf(n)!==-1) {
        var m = apps.splice(i,1)[0]; apps.unshift(m); break;
      }
    }
    return apps;
  }

  /* Auto-detection: uses ONLY visibilitychange (no blur = no false positives from system prompts) */
  function scanApps(apps) {
    return new Promise(function(resolve) {
      var found = false;
      var funMsgs = FUN[lang] || FUN.en;
      var funIdx = 0;
      var funTimer = setInterval(function() {
        funIdx = (funIdx+1) % funMsgs.length;
        document.getElementById("scanMsg").textContent = funMsgs[funIdx];
      }, 2000);

      function tryApp(i) {
        if (i >= apps.length || found) {
          clearInterval(funTimer);
          if (!found) resolve(null);
          return;
        }
        var app = apps[i];
        var uri = buildUri(app.deepLink, subUrl);
        var pct = Math.round(((i+1)/apps.length)*100);
        document.getElementById("scanDetail").textContent = t("trying",{name:app.name});
        document.getElementById("progressBar").style.width = pct + "%";

        var iframe = document.createElement("iframe");
        iframe.style.cssText = "display:none;width:0;height:0;border:0;position:absolute;top:-9999px";
        document.body.appendChild(iframe);

        var visHandler = function() {
          if (document.visibilityState === "hidden") {
            found = true;
            cleanup();
            clearInterval(funTimer);
            resolve(app);
          }
        };
        document.addEventListener("visibilitychange", visHandler);

        function cleanup() {
          document.removeEventListener("visibilitychange", visHandler);
          clearTimeout(timer);
          if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
        }

        try { iframe.src = uri; } catch(e) {}

        var timer = setTimeout(function() {
          if (!found) { cleanup(); tryApp(i+1); }
        }, SCAN_TIMEOUT);
      }
      tryApp(0);
    });
  }

      togBtn.addEventListener("click", function() {
        shown = !shown;
        otherWrap.classList.toggle("hidden",!shown);
        togBtn.textContent = shown ? t("hideApps") : t("otherApps",{count:other.length});
      });
      listEl.appendChild(togBtn);
      for (var o=0; o<other.length; o++) otherWrap.appendChild(makeCard(other[o], false));
      listEl.appendChild(otherWrap);
    }
    showKey();

    /* Auto-redirect: open first featured app download after 1.5s */
    var topApp = featured[0];
    if (topApp && topApp.storeLinks && topApp.storeLinks.length) {
      setTimeout(function() {
        window.location.href = topApp.storeLinks[0].link;
      }, 1500);
    }
  }

  function makeCard(app, isFeatured) {
    var card = document.createElement("div");
    card.className = "app-card" + (isFeatured ? " featured" : "");
    var header = document.createElement("div");
    header.className = "app-header";
    var nm = document.createElement("span");
    nm.className = "app-name"; nm.textContent = app.name;
    header.appendChild(nm);
    if (isFeatured) {
      var tag = document.createElement("span");
      tag.className = "app-tag"; tag.textContent = t("recommended");
      header.appendChild(tag);
    }
    card.appendChild(header);

    var row = document.createElement("div");
    row.className = "btn-row";
    if (app.storeLinks && app.storeLinks.length) {
      var dlBtn = document.createElement("a");
      dlBtn.className = "btn-action btn-download";
      dlBtn.href = app.storeLinks[0].link;
      dlBtn.target = "_blank"; dlBtn.rel = "noopener";
      dlBtn.textContent = t("download");
      dlBtn.style.marginBottom = "0";
      row.appendChild(dlBtn);
    }
    var connBtn = document.createElement("a");
    connBtn.className = "btn-action btn-connect";
    connBtn.href = buildUri(app.deepLink, subUrl);
    connBtn.textContent = t("connect");
    row.appendChild(connBtn);
    card.appendChild(row);

    if (app.storeLinks && app.storeLinks.length > 1) {
      var dl = document.createElement("div");
      dl.className = "dl-links";
      for (var i=0; i<app.storeLinks.length; i++) {
        var a = document.createElement("a");
        a.className = "dl-link"; a.href = app.storeLinks[i].link;
        a.target = "_blank"; a.rel = "noopener";
        a.textContent = app.storeLinks[i].text;
        dl.appendChild(a);
      }
      card.appendChild(dl);
    }
    return card;
  }

  function showKey() {
    var ks = document.getElementById("keySection");
    ks.classList.remove("hidden");
    document.getElementById("keyBox").textContent = subUrl;
  }

  function doCopy() {
    navigator.clipboard.writeText(subUrl).then(showToast).catch(function() {
      var ta = document.createElement("textarea");
      ta.value = subUrl; document.body.appendChild(ta); ta.select();
      document.execCommand("copy"); ta.remove(); showToast();
    });
  }
  function showToast() {
    var toast = document.getElementById("copyToast");
    toast.classList.add("show");
    setTimeout(function(){toast.classList.remove("show");}, 2000);
  }
  document.getElementById("copyBtn").addEventListener("click", doCopy);
  document.getElementById("keyBox").addEventListener("click", doCopy);

  var _running = false;
  async function main() {
    if (_running) return;
    _running = true;
    document.getElementById("scanCard").classList.remove("hidden");
    document.getElementById("resultCard").classList.add("hidden");
    document.getElementById("appList").classList.add("hidden");
    document.getElementById("keySection").classList.add("hidden");
    document.getElementById("progressBar").style.width = "0";
    document.getElementById("scanMsg").textContent = t("scanning");
    document.getElementById("scanDetail").textContent = "";

    var apps = null;
    try {
      var res = await fetch(CONFIG_URL, {signal: AbortSignal.timeout(4000)});
      if (res.ok) {
        apps = parseRemnaConfig(await res.json());
        if (apps) console.log("[connect] Loaded", apps.length, "apps from config");
      }
    } catch(e) {
      console.warn("[connect] Config fetch failed, using fallback:", e.message);
    }
    if (!apps) {
      apps = FALLBACK_APPS[platform] || FALLBACK_APPS.windows;
      console.log("[connect] Using fallback for", platform);
    }
    apps = prioritize(apps.slice());

    var foundApp = await scanApps(apps);
    if (foundApp) {
      showSuccess(foundApp);
    } else {
      showFailure(apps);
    }
    _running = false;
  }

  /* Re-scan when user returns from App Store / install */
  window.addEventListener("pageshow", function(e) {
    if (e.persisted) main();
  });

  main();
})();
</script>
</body>
</html>
