    for (var i = 1; i < apps.length; i++) {
      var n = apps[i].name.replace(/[-_\s]/g, '').toLowerCase();
      if (n.indexOf(hint) !== -1 || hint.indexOf(n) !== -1) {
        var m = apps.splice(i, 1)[0];
        apps.unshift(m);
        break;
      }
    }
    return apps;
  }

  /* ── DOM refs ──────────────────────────────────────────── */

  var funTextEl = document.getElementById('funText');
  var funSubEl = document.getElementById('funSub');
  var searchEmoji = document.getElementById('searchEmoji');
  var progressFill = document.getElementById('progressFill');

  /* ── Fun message rotation ──────────────────────────────── */

  var funMsgs = FUN[lang] || FUN.en;
  var funIdx = 0;
  var funInterval = null;

  function showFunMsg(msg) {
    funTextEl.classList.add('fade');
    setTimeout(function() {
      funTextEl.textContent = msg.text;
      funSubEl.textContent = msg.sub || '';
      searchEmoji.textContent = msg.emoji || '🔍';
      funTextEl.classList.remove('fade');
    }, 300);
  }

  function startFun() {
    showFunMsg(funMsgs[0]);
    funInterval = setInterval(function() {
      funIdx = (funIdx + 1) % funMsgs.length;
      showFunMsg(funMsgs[funIdx]);
    }, 1800);
  }

  function stopFun() {
    if (funInterval) { clearInterval(funInterval); funInterval = null; }
  }

  /* ── Scanning engine ───────────────────────────────────── */
  /*
   * Two-phase parallel scan for speed:
   *
   * Phase 1 (t=0): Create hidden iframes for ALL apps at once.
   *   Works on: Android Chrome, desktop browsers, TG WebView.
   *
   * Phase 2 (t=400ms): Sequential window.location.href fallback.
   *   One app every 400ms. Works on: iOS Safari (where iframes
   *   to custom schemes may be silently ignored).
   *
   * Detection: blur (with 200ms hidden-check) + visibilitychange.
   *   blur fires when app opens; 200ms later we confirm page is
   *   actually hidden (filters out Firefox system-prompt false positives).
   *
   * Total scan time: ~400 + N*400 + 300 buffer ≈ 3 seconds for 5 apps.
   */

  function scanApps(apps) {
    return new Promise(function(resolve) {
      var resolved = false;
      var currentApp = apps[0];
      var iframes = [];
      var locTimers = [];

      function finish(app) {
        if (resolved) return;
        resolved = true;
        stopFun();
        document.removeEventListener('visibilitychange', onVis);
        window.removeEventListener('blur', onBlur);
        for (var i = 0; i < iframes.length; i++) {
          if (iframes[i].parentNode) iframes[i].remove();
        }
        for (var j = 0; j < locTimers.length; j++) clearTimeout(locTimers[j]);
        clearTimeout(failTimer);
        resolve(app);
      }

      function onVis() {
        if (document.visibilityState === 'hidden' && !resolved) {
          finish(currentApp);
        }
      }

      function onBlur() {
        if (resolved) return;
        var cap = currentApp;
        setTimeout(function() {
          if (!resolved && document.visibilityState === 'hidden') {
            finish(cap);
          }
        }, 200);
      }

      document.addEventListener('visibilitychange', onVis);
      window.addEventListener('blur', onBlur);

      /* Phase 1: all iframes at once */
      for (var i = 0; i < apps.length; i++) {
        var uri = buildUri(apps[i].deepLink, subUrl);
        var iframe = document.createElement('iframe');
        iframe.style.cssText = 'display:none;width:0;height:0;border:0;position:absolute;top:-9999px';
        document.body.appendChild(iframe);
        try { iframe.src = uri; } catch (e) { /* ignore */ }
        iframes.push(iframe);
      }

      /* Phase 2: sequential window.location.href backup */
      for (var k = 0; k < apps.length; k++) {
        (function(idx) {
          var tid = setTimeout(function() {
            if (resolved) return;
            currentApp = apps[idx];
            var pct = Math.round(((idx + 1) / apps.length) * 100);
            progressFill.style.width = pct + '%';
            try { window.location.href = buildUri(apps[idx].deepLink, subUrl); } catch (e) { /* ignore */ }
          }, 400 + idx * 400);
          locTimers.push(tid);
        })(k);
      }

      /* Fail timeout */
      var totalMs = 400 + apps.length * 400 + 600;
      var failTimer = setTimeout(function() { finish(null); }, totalMs);
    });
  }

  /* ── Success state ─────────────────────────────────────── */

  function showSuccess(app) {
    document.getElementById('scanCard').classList.add('hidden');
    document.getElementById('subtitle').textContent = t('subtitle_found');

    var card = document.getElementById('scanCard');
    card.classList.remove('hidden');
    searchEmoji.textContent = '✅';
    searchEmoji.style.animation = 'none';
    funTextEl.textContent = t('found', { name: app.name });
    funSubEl.textContent = t('found_sub');
    progressFill.style.width = '100%';

    /* Show open button + key after a delay */
    setTimeout(function() {
      var sec = document.getElementById('resultSection');
      sec.classList.remove('hidden');
      var list = document.getElementById('appList');
      list.innerHTML = '';
      var btn = document.createElement('a');
      btn.className = 'btn btn-success';
      btn.href = buildUri(app.deepLink, subUrl);
      btn.textContent = t('open_app', { name: app.name });
      list.appendChild(btn);
      showKey();
    }, 2000);
  }

  /* ── Failure state ─────────────────────────────────────── */

  function showFailure(apps) {
    searchEmoji.textContent = '📲';
    searchEmoji.style.animation = 'none';
    funTextEl.textContent = t('not_found');
    funSubEl.textContent = t('not_found_sub');
    document.getElementById('subtitle').textContent = t('subtitle_fail');
    progressFill.style.width = '100%';

    renderAppList(apps);
    showKey();
  }

  /* ── Skip scan (Firefox mobile) ────────────────────────── */

  function showSkipScan(apps) {
    searchEmoji.textContent = '📱';
    searchEmoji.style.animation = 'none';
    funTextEl.textContent = t('choose_app');
    funSubEl.textContent = t('choose_sub');
    document.getElementById('subtitle').textContent = t('subtitle_fail');
    progressFill.style.width = '100%';

    renderAppList(apps);
    showKey();
  }

  /* ── App list ──────────────────────────────────────────── */

  function renderAppList(apps) {
    var sec = document.getElementById('resultSection');
    sec.classList.remove('hidden');
    var list = document.getElementById('appList');
    list.innerHTML = '';

    var top = [], other = [];
    for (var i = 0; i < apps.length; i++) {
      if (apps[i].featured) top.push(apps[i]); else other.push(apps[i]);
    }
    if (!top.length) { top.push(apps[0]); other = apps.slice(1); }

    for (var f = 0; f < top.length; f++) {
      list.appendChild(makeCard(top[f], f === 0));
    }

    if (other.length) {
      var togBtn = document.createElement('button');
      togBtn.className = 'other-toggle';
      togBtn.textContent = t('other_apps', { count: other.length });
      togBtn.type = 'button';
      var otherWrap = document.createElement('div');
      otherWrap.className = 'hidden';
      var shown = false;
      togBtn.addEventListener('click', function() {
        shown = !shown;
        otherWrap.classList.toggle('hidden', !shown);
        togBtn.textContent = shown ? t('hide_apps') : t('other_apps', { count: other.length });
      });
      list.appendChild(togBtn);
      for (var o = 0; o < other.length; o++) otherWrap.appendChild(makeCard(other[o], false));
      list.appendChild(otherWrap);
    }
  }

  function makeCard(app, isTop) {
    var card = document.createElement('div');
    card.className = 'app-card' + (isTop ? ' top' : '');

    var head = document.createElement('div');
    head.className = 'app-head';
    var nm = document.createElement('span');
    nm.className = 'app-name';
    nm.textContent = app.name;
    head.appendChild(nm);
    if (isTop) {
      var tag = document.createElement('span');
      tag.className = 'app-tag';
      tag.textContent = t('recommended');
      head.appendChild(tag);
    }
    card.appendChild(head);

    var row = document.createElement('div');
    row.className = 'btn-row';

    if (app.storeLinks && app.storeLinks.length) {
      var dlBtn = document.createElement('button');
      dlBtn.className = 'btn-act btn-purple';
      dlBtn.type = 'button';
      dlBtn.textContent = t('download');
      dlBtn.addEventListener('click', (function(a) {
        return function() {
          window.open(a.storeLinks[0].link, '_blank', 'noopener');
          enterWaitMode(a);
        };
      })(app));
      row.appendChild(dlBtn);
    }

    var connBtn = document.createElement('a');
    connBtn.className = 'btn-act btn-green';
    connBtn.href = buildUri(app.deepLink, subUrl);
    connBtn.textContent = t('connect');
    row.appendChild(connBtn);
    card.appendChild(row);

    if (app.storeLinks && app.storeLinks.length > 1) {
      var dl = document.createElement('div');
      dl.className = 'dl-links';
      for (var i = 0; i < app.storeLinks.length; i++) {
        var a = document.createElement('a');
        a.className = 'dl-link';
        a.href = app.storeLinks[i].link;
        a.target = '_blank';
        a.rel = 'noopener';
        a.textContent = app.storeLinks[i].text;
        dl.appendChild(a);
      }
      card.appendChild(dl);
    }

    return card;
  }

  /* ── Wait mode ─────────────────────────────────────────── */

  var _waitApp = null;

  function enterWaitMode(app) {
    _waitApp = app;
    document.getElementById('scanCard').classList.add('hidden');
    document.getElementById('resultSection').classList.add('hidden');
    document.getElementById('keySection').classList.add('hidden');
    var wc = document.getElementById('waitCard');
    wc.classList.remove('hidden');
    document.getElementById('waitText').textContent = t('waiting', { name: app.name });
    document.getElementById('waitSub').textContent = t('wait_sub');
  }

  function exitWaitMode() {
    _waitApp = null;
    document.getElementById('waitCard').classList.add('hidden');
  }

  document.getElementById('waitCancel').addEventListener('click', function() {
    exitWaitMode();
    document.getElementById('scanCard').classList.remove('hidden');
    document.getElementById('resultSection').classList.remove('hidden');
    showKey();
  });

  /* Try a single app (wait mode re-check) */
  function tryDetectSingle(app) {
    if (!app) return;
    var uri = buildUri(app.deepLink, subUrl);
    var detected = false;

    function onVis() {
      if (document.visibilityState === 'hidden' && !detected) {
        detected = true;
        cleanup();
        exitWaitMode();
        document.getElementById('scanCard').classList.remove('hidden');
        showSuccess(app);
      }
    }
    function onBlur() {
      if (detected) return;
      setTimeout(function() {
        if (!detected && document.visibilityState === 'hidden') {
          detected = true;
          cleanup();
          exitWaitMode();
          document.getElementById('scanCard').classList.remove('hidden');
          showSuccess(app);
        }
      }, 200);
    }
    function cleanup() {
      document.removeEventListener('visibilitychange', onVis);
      window.removeEventListener('blur', onBlur);
      if (iframe.parentNode) iframe.remove();
      clearTimeout(ft);
    }

    document.addEventListener('visibilitychange', onVis);
    window.addEventListener('blur', onBlur);

    var iframe = document.createElement('iframe');
    iframe.style.cssText = 'display:none;width:0;height:0;border:0;position:absolute;top:-9999px';
    document.body.appendChild(iframe);
    try { iframe.src = uri; } catch (e) { /* ignore */ }

    setTimeout(function() {
      if (!detected) { try { window.location.href = uri; } catch (e) { /* ignore */ } }
    }, 200);

    var ft = setTimeout(function() { if (!detected) cleanup(); }, 1500);
  }

  /* Re-detect when user returns from store */
  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'visible' && _waitApp) {
      setTimeout(function() { tryDetectSingle(_waitApp); }, 500);
    }
  });
  window.addEventListener('pageshow', function(ev) {
    if (_waitApp) {
      setTimeout(function() { tryDetectSingle(_waitApp); }, 500);
    } else if (ev.persisted && _scanDone) {
      main();
    }
  });

  /* ── Key & copy ────────────────────────────────────────── */

  function showKey() {
    var ks = document.getElementById('keySection');
    ks.classList.remove('hidden');
    document.getElementById('keyBox').textContent = subUrl;
  }

  function doCopy() {
    navigator.clipboard.writeText(subUrl).then(showToast).catch(function() {
      var ta = document.createElement('textarea');
      ta.value = subUrl;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
      showToast();
    });
  }

  function showToast() {
    var toast = document.getElementById('copyToast');
    toast.classList.add('show');
    setTimeout(function() { toast.classList.remove('show'); }, 2000);
  }

  document.getElementById('copyBtn').addEventListener('click', doCopy);
  document.getElementById('keyBox').addEventListener('click', doCopy);

  /* ── Main ──────────────────────────────────────────────── */

  var _running = false;
  var _scanDone = false;

  async function main() {
    if (_running) return;
    _running = true;

    /* Reset UI */
    document.getElementById('scanCard').classList.remove('hidden');
    document.getElementById('resultSection').classList.add('hidden');
    document.getElementById('keySection').classList.add('hidden');
    document.getElementById('waitCard').classList.add('hidden');
    searchEmoji.style.animation = '';
    progressFill.style.width = '0';
    document.getElementById('subtitle').textContent = t('subtitle_scan');

    /* Load config */
    var apps = null;
    try {
      var res = await fetch(CONFIG_URL, { signal: AbortSignal.timeout(4000) });
      if (res.ok) {
        apps = parseRemnaConfig(await res.json());
        if (apps) console.log('[connect] Loaded', apps.length, 'apps from config');
      }
    } catch (e) {
      console.warn('[connect] Config fetch failed:', e.message);
    }
    if (!apps) {
      apps = FALLBACK_APPS[platform] || FALLBACK_APPS.windows;
      console.log('[connect] Using fallback for', platform);
    }
    apps = prioritize(apps.slice());

    /* Firefox mobile: skip scan (avoid annoying prompts) */
    if (isFirefoxMobile) {
      showSkipScan(apps);
      _running = false;
      _scanDone = true;
      return;
    }

    /* Start fun messages + scan */
    startFun();
    var foundApp = await scanApps(apps);
    _scanDone = true;

    if (foundApp) {
      showSuccess(foundApp);
    } else {
      showFailure(apps);
    }
    _running = false;
  }

  setTimeout(main, 200);
})();
</script>
</body>
</html>
