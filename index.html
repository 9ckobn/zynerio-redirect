<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zynerio VPN — Connect</title>
<style>
  :root {
    --bg: #0f0f14;
    --card: #1a1a24;
    --accent: #6c5ce7;
    --accent-hover: #7f70f0;
    --text: #e8e8ef;
    --muted: #8888a0;
    --success: #00b894;
    --warn: #fdcb6e;
    --danger: #e17055;
    --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    max-width: 420px;
    width: 100%;
    text-align: center;
  }
  .logo {
    font-size: 48px;
    margin-bottom: 8px;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 28px;
  }
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 28px 24px;
    margin-bottom: 16px;
  }
  .status {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 8px;
  }
  .search-emoji {
    font-size: 40px;
    animation: bounce 1s ease infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .status-icon { font-size: 22px; }
  .fun-text {
    font-size: 15px;
    color: var(--text);
    min-height: 24px;
    transition: opacity .3s;
  }
  .fun-text.fade { opacity: 0; }
  .fun-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  .progress-bar {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,.08);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 8px;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 2px;
    transition: width .4s ease;
  }
  .btn {
    display: inline-block;
    width: 100%;
    padding: 14px 24px;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    text-decoration: none;
    transition: background .2s, transform .1s;
    color: #fff;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--accent); }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary {
    background: transparent;
    border: 1px solid rgba(255,255,255,.12);
    color: var(--muted);
    margin-top: 10px;
    font-size: 13px;
    padding: 10px 20px;
  }
  .btn-secondary:hover { border-color: rgba(255,255,255,.25); color: var(--text); }
  .hidden { display: none !important; }
  .manual-section {
    margin-top: 20px;
    text-align: left;
  }
  .manual-section h3 {
    font-size: 14px;
    margin-bottom: 8px;
    color: var(--muted);
  }
  .key-box {
    background: rgba(255,255,255,.06);
    border-radius: 10px;
    padding: 12px;
    font-family: 'SF Mono', Monaco, Consolas, monospace;
    font-size: 11px;
    word-break: break-all;
    color: var(--muted);
    position: relative;
    cursor: pointer;
    max-height: 80px;
    overflow: hidden;
    transition: max-height .3s;
  }
  .key-box.expanded { max-height: 400px; }
  .copy-toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--success);
    color: #fff;
    padding: 10px 24px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    transition: opacity .3s;
    pointer-events: none;
    z-index: 100;
  }
  .copy-toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">🔐</div>
  <h1>Zynerio VPN</h1>
  <p class="subtitle" id="subtitle"></p>

  <div class="card">
    <div class="status" id="status">
      <div class="search-emoji" id="searchEmoji">🔍</div>
      <div class="fun-text" id="funText"></div>
      <div class="fun-sub" id="funSub"></div>
      <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
  </div>

  <!-- Shown when all attempts fail -->
  <div id="fallbackSection" class="hidden">
    <div id="storeButtons"></div>
    <button class="btn btn-secondary" onclick="copyKey()" id="copyKeyBtn">
      📋
    </button>
  </div>

  <!-- Manual key section -->
  <div class="manual-section hidden" id="manualSection">
    <h3 id="manualKeyTitle"></h3>
    <div class="key-box" id="keyBox" onclick="copyKey()"></div>
  </div>
</div>

<div class="copy-toast" id="copyToast"></div>

<script>
(function() {
  'use strict';

  /* ── Config endpoint (proxied through Caddy to subscription-page) ── */

  const CONFIG_URL = '/add_sub/config';

  /* ── Localization ───────────────────────────────────────── */

  const LANGS = {
    ru: {
      title:          'Zynerio VPN — Подключение',
      subtitle:       'Секундочку…',
      loading:        'Загружаем конфиг…',
      errorNoSub:     'Ошибка: нет ссылки подписки',
      copyKeyBtn:     '📋 Скопировать ключ подписки',
      manualKeyTitle: 'Ключ подписки (нажмите, чтобы скопировать):',
      copied:         '✅ Скопировано!',
      opening:        'Открываем {name}…',
      openingSub:     'VPN уже настраивается',
      openingSubtitle:'Настраиваем ваш VPN',
      notFound:       'Приложение не найдено',
      notFoundSub:    'Но это легко исправить!',
      notFoundSubtitle:'Установите VPN-приложение',
      download:       'Скачать {name}',
      otherApps:      '📋 Другие приложения',
      hideApps:       '▲ Скрыть',
      funMessages: [
        { text: 'Копаемся на вашем устройстве…', emoji: '🔍', sub: 'Не волнуйтесь, мы аккуратно' },
        { text: 'Ищем шпионов…',                emoji: '🕵️', sub: 'Пока чисто, продолжаем' },
        { text: 'Заглядываем под капот…',        emoji: '🔧', sub: 'Тут столько всего интересного' },
        { text: 'Проверяем тайные папки…',       emoji: '📂', sub: 'Обещаем — не подглядываем' },
        { text: 'Стучимся в приложения…',        emoji: '🚪', sub: 'Тук-тук, есть кто дома?' },
        { text: 'Допрашиваем иконки…',           emoji: '🧐', sub: 'Молчат, но мы найдём' },
        { text: 'Сканируем окрестности…',        emoji: '📡', sub: 'Почти нашли, кажется…' },
        { text: 'Спрашиваем у Siri… шутка',      emoji: '🤖', sub: 'Она бы не помогла' },
        { text: 'Проверяем последнее…',          emoji: '🎯', sub: 'Ещё чуть-чуть' },
      ],
    },
    en: {
      title:          'Zynerio VPN — Connect',
      subtitle:       'One moment…',
      loading:        'Loading config…',
      errorNoSub:     'Error: no subscription URL',
      copyKeyBtn:     '📋 Copy subscription key',
      manualKeyTitle: 'Subscription key (tap to copy):',
      copied:         '✅ Copied!',
      opening:        'Opening {name}…',
      openingSub:     'Your VPN is being configured',
      openingSubtitle:'Configuring your VPN',
      notFound:       'App not found',
      notFoundSub:    'But that\'s an easy fix!',
      notFoundSubtitle:'Install a VPN app to continue',
      download:       'Download {name}',
      otherApps:      '📋 Other apps',
      hideApps:       '▲ Hide',
      funMessages: [
        { text: 'Digging through your device…',  emoji: '🔍', sub: 'Don\'t worry, we\'re gentle' },
        { text: 'Looking for spies…',            emoji: '🕵️', sub: 'All clear so far' },
        { text: 'Peeking under the hood…',       emoji: '🔧', sub: 'So many interesting things here' },
        { text: 'Checking secret folders…',      emoji: '📂', sub: 'Promise we won\'t peek' },
        { text: 'Knocking on apps…',             emoji: '🚪', sub: 'Knock-knock, anyone home?' },
        { text: 'Interrogating icons…',          emoji: '🧐', sub: 'They\'re silent, but we\'ll find it' },
        { text: 'Scanning the area…',            emoji: '📡', sub: 'Almost found it, maybe…' },
        { text: 'Asking Siri… just kidding',     emoji: '🤖', sub: 'She wouldn\'t help anyway' },
        { text: 'Checking the last one…',        emoji: '🎯', sub: 'Almost there' },
      ],
    },
  };

  // Detect language: URL param > browser language > default 'en'
  const _params0 = new URLSearchParams(window.location.search);
  const langParam = (_params0.get('lang_code') || '').toLowerCase();
  const browserLang = (navigator.language || '').slice(0, 2).toLowerCase();
  const lang = LANGS[langParam] ? langParam : (LANGS[browserLang] ? browserLang : 'en');
  const L = LANGS[lang];

  function t(key, vars) {
    let s = L[key] || LANGS.en[key] || key;
    if (vars) for (const [k, v] of Object.entries(vars)) s = s.replace('{' + k + '}', v);
    return s;
  }

  // Apply static locale
  document.getElementById('htmlRoot').lang = lang;
  document.title = t('title');
  document.getElementById('subtitle').textContent = t('subtitle');
  document.getElementById('funText').textContent = t('loading');
  document.getElementById('copyKeyBtn').textContent = t('copyKeyBtn');
  document.getElementById('manualKeyTitle').textContent = t('manualKeyTitle');
  document.getElementById('copyToast').textContent = t('copied');

  /* ── Hardcoded fallback (used when config fetch fails) ────────────── */

  const FALLBACK_APPS = {
    ios: [
      { name: 'Happ',         deepLink: 'happ://add/{{SUB}}',                                      storeLink: 'https://apps.apple.com/ru/app/happ-proxy-utility-plus/id6746188973' },
      { name: 'Streisand',    deepLink: 'streisand://import/{{SUB}}',                               storeLink: 'https://apps.apple.com/ru/app/streisand/id6450534064' },
      { name: 'Stash',        deepLink: 'stash://install-config?url={{ENC}}',                       storeLink: 'https://apps.apple.com/us/app/stash-rule-based-proxy/id1596063349' },
      { name: 'Shadowrocket', deepLink: 'shadowrocket://add/{{SUB}}',                              storeLink: 'https://apps.apple.com/ru/app/shadowrocket/id932747118' },
    ],
    android: [
      { name: 'Happ',         deepLink: 'happ://add/{{SUB}}',                                      storeLink: 'https://play.google.com/store/apps/details?id=com.happproxy' },
      { name: 'FlClashX',     deepLink: 'flclashx://install-config?url={{ENC}}',                    storeLink: 'https://github.com/pluralplay/FlClashX/releases/latest/download/FlClashX-android-universal.apk' },
      { name: 'Clash Meta',   deepLink: 'clashmeta://install-config?url={{ENC}}',                   storeLink: 'https://github.com/MetaCubeX/ClashMetaForAndroid/releases/download/v2.11.20/cmfa-2.11.20-meta-universal-release.apk' },
      { name: 'V2RayNG',      deepLink: 'v2rayng://install-config?url={{ENC}}',                     storeLink: 'https://github.com/2dust/v2rayNG/releases/latest' },
    ],
    macos: [
      { name: 'Happ',         deepLink: 'happ://add/{{SUB}}',                                      storeLink: 'https://apps.apple.com/ru/app/happ-proxy-utility-plus/id6746188973' },
      { name: 'FlClashX',     deepLink: 'flclashx://install-config?url={{ENC}}',                    storeLink: 'https://github.com/pluralplay/FlClashX/releases/latest' },
      { name: 'Koala Clash',  deepLink: 'koala-clash://install-config?url={{ENC}}',                 storeLink: 'https://github.com/coolcoala/clash-verge-rev-lite/releases/latest' },
    ],
    windows: [
      { name: 'Happ',         deepLink: 'happ://add/{{SUB}}',                                      storeLink: 'https://github.com/Happ-proxy/happ-desktop/releases/latest/download/setup-Happ.x64.exe' },
      { name: 'FlClashX',     deepLink: 'flclashx://install-config?url={{ENC}}',                    storeLink: 'https://github.com/pluralplay/FlClashX/releases/latest/download/FlClashX-windows-amd64-setup.exe' },
      { name: 'Koala Clash',  deepLink: 'koala-clash://install-config?url={{ENC}}',                 storeLink: 'https://github.com/coolcoala/clash-verge-rev-lite/releases/latest/download/Koala.Clash_x64-setup.exe' },
    ],
    linux: [
      { name: 'FlClashX',     deepLink: 'flclashx://install-config?url={{ENC}}',                    storeLink: 'https://github.com/pluralplay/FlClashX/releases/latest' },
      { name: 'Koala Clash',  deepLink: 'koala-clash://install-config?url={{ENC}}',                 storeLink: 'https://github.com/coolcoala/clash-verge-rev-lite/releases/latest' },
    ],
  };

  /* ── Parse URL params ──────────────────────────────────── */

  const params  = new URLSearchParams(window.location.search);
  const subUrl  = params.get('sub') || '';
  const appHint = (params.get('app') || '').toLowerCase();

  if (!subUrl) {
    document.getElementById('funText').textContent = t('errorNoSub');
    document.getElementById('searchEmoji').textContent = '⚠️';
    document.getElementById('searchEmoji').style.animation = 'none';
    document.getElementById('funSub').textContent = '';
    document.getElementById('progressBar').style.display = 'none';
    return;
  }

  /* ── Detect platform ───────────────────────────────────── */

  function detectPlatform() {
    const ua = navigator.userAgent.toLowerCase();
    if (/iphone|ipad|ipod/.test(ua)) return 'ios';
    if (/android/.test(ua))           return 'android';
    if (/macintosh|mac os/.test(ua))  return 'macos';
    if (/windows/.test(ua))           return 'windows';
    if (/linux/.test(ua))             return 'linux';
    return 'windows'; // safe desktop fallback
  }

  const platform = detectPlatform();

  /* ── Parse Remnawave subscription-page config ──────────── */

  function parseRemnaConfig(cfg) {
    // cfg is the full .app-config-v2.json
    // Structure: { platforms: { ios: { apps: [ { name, featured, blocks: [ { buttons: [...] } ] } ] } } }
    const platformCfg = cfg?.platforms?.[platform];
    if (!platformCfg?.apps?.length) return null;

    const apps = [];
    for (const app of platformCfg.apps) {
      const name = app.name || 'Unknown';
      let deepLink  = null;
      let storeLink = null;
      const storeLinks = [];

      for (const block of (app.blocks || [])) {
        for (const btn of (block.buttons || [])) {
          if (btn.type === 'subscriptionLink' && btn.link && !deepLink) {
            deepLink = btn.link;
          }
          if (btn.type === 'external' && btn.link) {
            if (!storeLink) storeLink = btn.link;
            storeLinks.push({ text: btn.text || t('download', { name }), link: btn.link });
          }
        }
      }

      if (deepLink) {
        apps.push({ name, deepLink, storeLink, storeLinks, featured: !!app.featured });
      }
    }

    return apps.length ? apps : null;
  }

  /* ── Build URI from deep-link template ─────────────────── */

  function buildUri(template, sub) {
    return template
      .replace('{{SUBSCRIPTION_LINK}}', sub)
      .replace('{{USERNAME}}', '')
      .replace('{{HAPP_CRYPT3_LINK}}', sub)
      .replace('{{HAPP_CRYPT4_LINK}}', sub)
      .replace('{{SUB}}', sub)
      .replace('{{ENC}}', encodeURIComponent(sub));
  }

  /* ── Prioritize apps: move appHint match to front ──────── */

  function prioritize(apps) {
    if (!appHint || appHint === '_default') return apps;
    const hint = appHint.replace(/[-_\s]/g, '').toLowerCase();
    const idx = apps.findIndex(a =>
      a.name.replace(/[-_\s]/g, '').toLowerCase().includes(hint) ||
      hint.includes(a.name.replace(/[-_\s]/g, '').toLowerCase())
    );
    if (idx > 0) {
      const [match] = apps.splice(idx, 1);
      apps.unshift(match);
    }
    return apps;
  }

  /* ── DOM refs ──────────────────────────────────────────── */

  const funTextEl    = document.getElementById('funText');
  const funSubEl     = document.getElementById('funSub');
  const searchEmoji  = document.getElementById('searchEmoji');
  const progressFill = document.getElementById('progressFill');

  /* ── Fun loading messages ──────────────────────────────── */

  const FUN_MESSAGES = L.funMessages;

  let funMsgIdx = 0;
  let funInterval = null;

  function showFunMessage(msg) {
    funTextEl.classList.add('fade');
    setTimeout(() => {
      funTextEl.textContent = msg.text;
      funSubEl.textContent = msg.sub || '';
      searchEmoji.textContent = msg.emoji || '🔍';
      funTextEl.classList.remove('fade');
    }, 300);
  }

  function startFunMessages() {
    showFunMessage(FUN_MESSAGES[0]);
    funInterval = setInterval(() => {
      funMsgIdx = (funMsgIdx + 1) % FUN_MESSAGES.length;
      showFunMessage(FUN_MESSAGES[funMsgIdx]);
    }, 2000);
  }

  function stopFunMessages() {
    if (funInterval) { clearInterval(funInterval); funInterval = null; }
  }

  function updateProgress(current, total) {
    const pct = Math.min(100, Math.round(((current + 1) / total) * 100));
    progressFill.style.width = pct + '%';
  }

  /* ── Deep-link attempt engine ──────────────────────────── */

  let currentIdx = 0;
  let appOpened  = false;
  let candidates = [];

  function onAppOpened(name) {
    appOpened = true;
    stopFunMessages();
    progressFill.style.width = '100%';
    searchEmoji.textContent = '✅';
    searchEmoji.style.animation = 'none';
    funTextEl.textContent = t('opening', { name });
    funSubEl.textContent = t('openingSub');
    document.getElementById('subtitle').textContent = t('openingSubtitle');
    document.getElementById('progressBar').style.display = 'none';
    setTimeout(() => {
      document.getElementById('manualSection').classList.remove('hidden');
      document.getElementById('keyBox').textContent = subUrl;
    }, 3000);
  }

  function onAllFailed() {
    stopFunMessages();
    searchEmoji.textContent = '📲';
    searchEmoji.style.animation = 'none';
    funTextEl.textContent = t('notFound');
    funSubEl.textContent = t('notFoundSub');
    document.getElementById('subtitle').textContent = t('notFoundSubtitle');
    document.getElementById('progressBar').style.display = 'none';

    document.getElementById('fallbackSection').classList.remove('hidden');
    document.getElementById('manualSection').classList.remove('hidden');
    document.getElementById('keyBox').textContent = subUrl;

    // Collect all unique store links
    const container = document.getElementById('storeButtons');
    const allLinks = [];
    const seen = new Set();
    for (const app of candidates) {
      const links = app.storeLinks && app.storeLinks.length ? app.storeLinks : (app.storeLink ? [{ text: t('download', { name: app.name }), link: app.storeLink }] : []);
      for (const sl of links) {
        if (seen.has(sl.link)) continue;
        seen.add(sl.link);
        allLinks.push({ text: sl.text || t('download', { name: app.name }), link: sl.link });
      }
    }
    // Fallback if no store links at all
    if (!allLinks.length) {
      allLinks.push({ text: t('download', { name: 'Happ' }), link: 'https://apps.apple.com/ru/app/happ-proxy-utility-plus/id6746188973' });
    }

    // Show the first (primary) download button
    const primary = document.createElement('a');
    primary.className = 'btn btn-primary';
    primary.style.marginBottom = '8px';
    primary.href = allLinks[0].link;
    primary.target = '_blank';
    primary.rel = 'noopener';
    primary.textContent = '📥 ' + allLinks[0].text;
    container.appendChild(primary);

    // If there are more apps, add "Other apps" toggle
    if (allLinks.length > 1) {
      const moreWrap = document.createElement('div');
      moreWrap.id = 'moreApps';
      moreWrap.style.display = 'none';
      moreWrap.style.marginTop = '8px';

      for (let i = 1; i < allLinks.length; i++) {
        const a = document.createElement('a');
        a.className = 'btn btn-primary';
        a.style.marginBottom = '8px';
        a.href = allLinks[i].link;
        a.target = '_blank';
        a.rel = 'noopener';
        a.textContent = '📥 ' + allLinks[i].text;
        moreWrap.appendChild(a);
      }

      const toggleBtn = document.createElement('button');
      toggleBtn.className = 'btn btn-secondary';
      toggleBtn.style.marginBottom = '8px';
      toggleBtn.textContent = t('otherApps');
      toggleBtn.addEventListener('click', function() {
        const wrap = document.getElementById('moreApps');
        if (wrap.style.display === 'none') {
          wrap.style.display = 'block';
          toggleBtn.textContent = t('hideApps');
        } else {
          wrap.style.display = 'none';
          toggleBtn.textContent = t('otherApps');
        }
      });

      container.appendChild(toggleBtn);
      container.appendChild(moreWrap);
    }
  }

  function tryNext() {
    if (appOpened || currentIdx >= candidates.length) {
      if (!appOpened) onAllFailed();
      return;
    }

    const app = candidates[currentIdx];
    const uri = buildUri(app.deepLink, subUrl);
    const idx = currentIdx;

    updateProgress(idx, candidates.length);

    let detected = false;

    function onBlur() {
      detected = true;
      cleanup();
      onAppOpened(app.name);
    }
    function onVisChange() {
      if (document.hidden) {
        detected = true;
        cleanup();
        onAppOpened(app.name);
      }
    }
    function cleanup() {
      window.removeEventListener('blur', onBlur);
      document.removeEventListener('visibilitychange', onVisChange);
    }

    window.addEventListener('blur', onBlur);
    document.addEventListener('visibilitychange', onVisChange);

    // Try via hidden iframe
    const iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    iframe.src = uri;
    document.body.appendChild(iframe);

    // Also try window.location for platforms where iframe doesn't work
    setTimeout(() => {
      if (!detected && !appOpened) {
        window.location.href = uri;
      }
    }, 200);

    // Check result after timeout
    setTimeout(() => {
      cleanup();
      if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
      if (!detected && !appOpened) {
        currentIdx++;
        tryNext();
      }
    }, 1500);
  }

  /* ── Copy key helper ───────────────────────────────────── */

  window.copyKey = function() {
    navigator.clipboard.writeText(subUrl).then(() => {
      const toast = document.getElementById('copyToast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = subUrl;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
      const toast = document.getElementById('copyToast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    });
  };

  /* ── Main: fetch config → try deep-links ───────────────── */

  async function main() {
    let apps = null;

    // 1. Try to load dynamic config from Remnawave
    try {
      const res = await fetch(CONFIG_URL, { signal: AbortSignal.timeout(4000) });
      if (res.ok) {
        const cfg = await res.json();
        apps = parseRemnaConfig(cfg);
        if (apps) console.log('[connect] Loaded', apps.length, 'apps from Remnawave config');
      }
    } catch (e) {
      console.warn('[connect] Config fetch failed, using fallback:', e.message);
    }

    // 2. Fallback to hardcoded list
    if (!apps) {
      apps = FALLBACK_APPS[platform] || FALLBACK_APPS.windows;
      console.log('[connect] Using fallback apps for', platform);
    }

    // 3. Prioritize if app hint is given
    candidates = prioritize([...apps]);

    // 4. Start fun messages and begin trying
    startFunMessages();
    setTimeout(tryNext, 300);
  }

  main();

})();
</script>
