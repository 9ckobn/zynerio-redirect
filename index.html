  function detectPlatform() {
    const ua = navigator.userAgent.toLowerCase();
    if (/iphone|ipad|ipod/.test(ua)) return 'ios';
    if (/android/.test(ua))           return 'android';
    if (/macintosh|mac os/.test(ua))  return 'macos';
    if (/windows/.test(ua))           return 'windows';
    if (/linux/.test(ua))             return 'linux';
    return 'windows'; // safe desktop fallback
  }

  function parseRemnaConfig(cfg) {
    // Remnawave config: { platforms: { ios: [ { id, name, isFeatured, urlScheme, installationStep: { buttons: [{buttonLink, buttonText}] } } ] } }
    const platformApps = cfg?.platforms?.[platform];
    if (!Array.isArray(platformApps) || !platformApps.length) return null;

    const apps = [];
    for (const app of platformApps) {
      const scheme = app.urlScheme;
      if (!scheme) continue;

      // Build deep link template: if scheme ends with = it's a query param (needs encoding)
      const deepLink = scheme + (scheme.endsWith('=') ? '{{ENC}}' : '{{SUB}}');

      const storeLinks = [];
      if (app.installationStep?.buttons) {
        for (const btn of app.installationStep.buttons) {
          if (btn.buttonLink) {
            const text = btn.buttonText?.[lang] || btn.buttonText?.en || btn.buttonText?.ru || app.name;
            storeLinks.push({ text, link: btn.buttonLink });
          }
        }
      }

      apps.push({
        name: app.name || app.id || 'Unknown',
        deepLink,
        storeLink: storeLinks.length ? storeLinks[0].link : null,
        storeLinks,
        featured: !!app.isFeatured,
      });
    }

    // Sort: featured apps first
    apps.sort((a, b) => (b.featured ? 1 : 0) - (a.featured ? 1 : 0));

    return apps.length ? apps : null;
  }

  function buildUri(template, sub) {
    return template
      .replace('{{SUBSCRIPTION_LINK}}', sub)
      .replace('{{USERNAME}}', '')
      .replace('{{HAPP_CRYPT3_LINK}}', sub)
      .replace('{{HAPP_CRYPT4_LINK}}', sub)
      .replace('{{SUB}}', sub)
      .replace('{{ENC}}', encodeURIComponent(sub));
  }

  /* ── Prioritize apps: move appHint match to front ──────── */

  function prioritize(apps) {
    if (!appHint || appHint === '_default') return apps;
    const hint = appHint.replace(/[-_\s]/g, '').toLowerCase();
    const idx = apps.findIndex(a =>
      a.name.replace(/[-_\s]/g, '').toLowerCase().includes(hint) ||
      hint.includes(a.name.replace(/[-_\s]/g, '').toLowerCase())
    );
    if (idx > 0) {
      const [match] = apps.splice(idx, 1);
      apps.unshift(match);
    }
    return apps;
  }

  /* ── DOM refs ──────────────────────────────────────────── */

  const funTextEl    = document.getElementById('funText');
  const funSubEl     = document.getElementById('funSub');
  const searchEmoji  = document.getElementById('searchEmoji');
  const progressFill = document.getElementById('progressFill');

  /* ── Fun loading messages ──────────────────────────────── */

  const FUN_MESSAGES = L.funMessages;

  let funMsgIdx = 0;
  let funInterval = null;

  function showFunMessage(msg) {
    funTextEl.classList.add('fade');
    setTimeout(() => {
      funTextEl.textContent = msg.text;
      funSubEl.textContent = msg.sub || '';
      searchEmoji.textContent = msg.emoji || '🔍';
      funTextEl.classList.remove('fade');
    }, 300);
  }

  function startFunMessages() {
    showFunMessage(FUN_MESSAGES[0]);
    funInterval = setInterval(() => {
      funMsgIdx = (funMsgIdx + 1) % FUN_MESSAGES.length;
      showFunMessage(FUN_MESSAGES[funMsgIdx]);
    }, 2000);
  }

  function stopFunMessages() {
    if (funInterval) { clearInterval(funInterval); funInterval = null; }
  }

  function updateProgress(current, total) {
    const pct = Math.min(100, Math.round(((current + 1) / total) * 100));
    progressFill.style.width = pct + '%';
  }

  /* ── Deep-link attempt engine ──────────────────────────── */

  let currentIdx = 0;
  let appOpened  = false;
  let candidates = [];

  function onAppOpened(name) {
    appOpened = true;
    stopFunMessages();
    stopPostDownloadPolling();
    progressFill.style.width = '100%';
    searchEmoji.textContent = '✅';
    searchEmoji.className = 'search-emoji';
    searchEmoji.style.animation = 'none';
    funTextEl.textContent = t('opening', { name });
    funSubEl.textContent = t('openingSub');
    document.getElementById('subtitle').textContent = t('openingSubtitle');
    document.getElementById('progressBar').style.display = 'none';
    // Hide fallback download buttons since we succeeded
    document.getElementById('fallbackSection').classList.add('hidden');
    setTimeout(() => {
      document.getElementById('manualSection').classList.remove('hidden');
      document.getElementById('keyBox').textContent = subUrl;
    }, 3000);
  }

  function onAllFailed() {
    stopFunMessages();
    searchEmoji.textContent = '📲';
    searchEmoji.style.animation = 'none';
    funTextEl.textContent = t('notFound');
    funSubEl.textContent = t('notFoundSub');
    document.getElementById('subtitle').textContent = t('notFoundSubtitle');
    document.getElementById('progressBar').style.display = 'none';

    document.getElementById('fallbackSection').classList.remove('hidden');
    document.getElementById('manualSection').classList.remove('hidden');
    document.getElementById('keyBox').textContent = subUrl;

    // Collect all unique store links
    const container = document.getElementById('storeButtons');
    const allLinks = [];
    const seen = new Set();
    for (const app of candidates) {
      const links = app.storeLinks && app.storeLinks.length ? app.storeLinks : (app.storeLink ? [{ text: t('download', { name: app.name }), link: app.storeLink }] : []);
      for (const sl of links) {
        if (seen.has(sl.link)) continue;
        seen.add(sl.link);
        allLinks.push({ text: sl.text || t('download', { name: app.name }), link: sl.link });
      }
    }
    // Fallback if no store links at all
    if (!allLinks.length) {
      allLinks.push({ text: t('download', { name: 'Happ' }), link: 'https://apps.apple.com/ru/app/happ-proxy-utility-plus/id6746188973' });
    }

    // Show the first (primary) download button
    const primary = document.createElement('a');
    primary.className = 'btn btn-primary';
    primary.style.marginBottom = '8px';
    primary.href = allLinks[0].link;
    primary.target = '_blank';
    primary.rel = 'noopener';
    primary.textContent = '📥 ' + allLinks[0].text;
    primary.addEventListener('click', function() {
      setTimeout(startPostDownloadPolling, 500);
    });
    container.appendChild(primary);

    // If there are more apps, add "Other apps" toggle
    if (allLinks.length > 1) {
      const moreWrap = document.createElement('div');
      moreWrap.id = 'moreApps';
      moreWrap.style.display = 'none';
      moreWrap.style.marginTop = '8px';

      for (let i = 1; i < allLinks.length; i++) {
        const a = document.createElement('a');
        a.className = 'btn btn-primary';
        a.style.marginBottom = '8px';
        a.href = allLinks[i].link;
        a.target = '_blank';
        a.rel = 'noopener';
        a.textContent = '📥 ' + allLinks[i].text;
        a.addEventListener('click', function() {
          setTimeout(startPostDownloadPolling, 500);
        });
        moreWrap.appendChild(a);
      }

      const toggleBtn = document.createElement('button');
      toggleBtn.className = 'btn btn-secondary';
      toggleBtn.style.marginBottom = '8px';
      toggleBtn.textContent = t('otherApps');
      toggleBtn.addEventListener('click', function() {
        const wrap = document.getElementById('moreApps');
        if (wrap.style.display === 'none') {
          wrap.style.display = 'block';
          toggleBtn.textContent = t('hideApps');
        } else {
          wrap.style.display = 'none';
          toggleBtn.textContent = t('otherApps');
        }
      });

      container.appendChild(toggleBtn);
      container.appendChild(moreWrap);
    }
  }

  function tryNext() {
    if (appOpened || currentIdx >= candidates.length) {
      if (!appOpened) onAllFailed();
      return;
    }

    const app = candidates[currentIdx];
    const uri = buildUri(app.deepLink, subUrl);
    const idx = currentIdx;

    updateProgress(idx, candidates.length);

    let detected = false;

    function onBlur() {
      detected = true;
      cleanup();
      onAppOpened(app.name);
    }
    function onVisChange() {
      if (document.hidden) {
        detected = true;
        cleanup();
        onAppOpened(app.name);
      }
    }
    function cleanup() {
      window.removeEventListener('blur', onBlur);
      document.removeEventListener('visibilitychange', onVisChange);
    }

    window.addEventListener('blur', onBlur);
    document.addEventListener('visibilitychange', onVisChange);

    // Try via hidden iframe (safe: no system dialog on failure)
    const iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    iframe.src = uri;
    document.body.appendChild(iframe);

    // Check result after timeout
    setTimeout(() => {
      cleanup();
      if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
      if (!detected && !appOpened) {
        currentIdx++;
        tryNext();
      }
    }, 1500);
  }

  /* ── Post-download polling ──────────────────────────────── */

  let pollInterval = null;
  let pollCandIdx  = 0;
  let pollMsgIdx   = 0;
  let pollMsgInterval = null;
  let pollIgnoreBlurUntil = 0; // timestamp: ignore blur events until this time

  function startPostDownloadPolling() {
    if (pollInterval || appOpened) return; // already polling or done

    // Ignore blur/visibility events for 3s (the store/browser tab is opening)
    pollIgnoreBlurUntil = Date.now() + 3000;

    // Switch UI to "waiting for install" state
    const card = document.querySelector('.card');
    card.classList.remove('hidden');
    searchEmoji.className = 'search-emoji pulse';
    searchEmoji.textContent = '⏳';
    funTextEl.textContent = t('waitingInstall');
    funSubEl.textContent = t('waitingSub');
    document.getElementById('subtitle').textContent = t('waitingSubtitle');

    // Show progress bar in indeterminate/pulse mode
    const pb = document.getElementById('progressBar');
    pb.style.display = '';
    progressFill.style.width = '100%';
    progressFill.style.opacity = '0.4';
    progressFill.style.animation = 'pulse 1.5s ease infinite';

    // Add hint below the card
    let hint = document.getElementById('pollHint');
    if (!hint) {
      hint = document.createElement('div');
      hint.id = 'pollHint';
      hint.className = 'poll-hint';
      hint.textContent = t('waitingPoll');
      card.appendChild(hint);
    }

    // Rotate waiting messages
    const waitMsgs = L.waitingMessages;
    pollMsgInterval = setInterval(() => {
      pollMsgIdx = (pollMsgIdx + 1) % waitMsgs.length;
      showFunMessage(waitMsgs[pollMsgIdx]);
    }, 3000);

    // Listen for app opening (but with grace period)
    window.addEventListener('blur', onPollBlur);
    document.addEventListener('visibilitychange', onPollVisChange);

    // Also: when user returns from the store, immediately try all links fast
    window.addEventListener('focus', onPollFocusReturn);

    // Start gentle background polling after the grace period
    setTimeout(() => {
      if (appOpened) return;
      pollInterval = setInterval(() => {
        if (appOpened) { stopPostDownloadPolling(); return; }
        // Don't try while page is hidden (user is in store)
        if (document.hidden) return;

        const app = candidates[pollCandIdx % candidates.length];
        const uri = buildUri(app.deepLink, subUrl);

        // Try via hidden iframe only (no location.href — that would navigate away)
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = uri;
        document.body.appendChild(iframe);
        setTimeout(() => { if (iframe.parentNode) iframe.parentNode.removeChild(iframe); }, 1500);

        pollCandIdx++;
      }, 2500);
    }, 3000);

    console.log('[connect] Post-download polling started');
  }

  // When user returns from the store → immediately try all apps quickly
  function onPollFocusReturn() {
    if (appOpened || !pollInterval && pollIgnoreBlurUntil > Date.now()) return;
    // Small delay to let the page settle
    setTimeout(() => {
      if (appOpened) return;
      pollIgnoreBlurUntil = 0; // clear grace period, now blur = real detection
      // Try each candidate rapidly
      let i = 0;
      function tryPollCandidate() {
        if (appOpened || i >= candidates.length) return;
        const app = candidates[i];
        const uri = buildUri(app.deepLink, subUrl);
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = uri;
        document.body.appendChild(iframe);
        setTimeout(() => { if (iframe.parentNode) iframe.parentNode.removeChild(iframe); }, 1200);
        i++;
        setTimeout(tryPollCandidate, 300);
      }
      tryPollCandidate();
    }, 500);
  }

  function onPollBlur() {
    if (appOpened) return;
    if (Date.now() < pollIgnoreBlurUntil) return; // ignore blur from store open
    const app = candidates[Math.max(0, (pollCandIdx - 1)) % candidates.length] || candidates[0];
    stopPostDownloadPolling();
    onAppOpened(app.name);
  }

  function onPollVisChange() {
    if (appOpened) return;
    if (document.hidden) {
      if (Date.now() < pollIgnoreBlurUntil) return; // ignore from store open
      const app = candidates[Math.max(0, (pollCandIdx - 1)) % candidates.length] || candidates[0];
      stopPostDownloadPolling();
      onAppOpened(app.name);
    }
  }

  function stopPostDownloadPolling() {
    if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
    if (pollMsgInterval) { clearInterval(pollMsgInterval); pollMsgInterval = null; }
    window.removeEventListener('blur', onPollBlur);
    document.removeEventListener('visibilitychange', onPollVisChange);
    window.removeEventListener('focus', onPollFocusReturn);
    progressFill.style.animation = 'none';
    progressFill.style.opacity = '1';
    const hint = document.getElementById('pollHint');
    if (hint) hint.remove();
    console.log('[connect] Post-download polling stopped');
  }

  /* ── Copy key helper ───────────────────────────────────── */

  window.copyKey = function() {
    navigator.clipboard.writeText(subUrl).then(() => {
      const toast = document.getElementById('copyToast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = subUrl;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
      const toast = document.getElementById('copyToast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    });
  };

  /* ── Main: fetch config → try deep-links ───────────────── */

  async function main() {
    let apps = null;

    // 1. Try to load dynamic config from Remnawave
    try {
      const res = await fetch(CONFIG_URL, { signal: AbortSignal.timeout(4000) });
      if (res.ok) {
        const cfg = await res.json();
        apps = parseRemnaConfig(cfg);
        if (apps) console.log('[connect] Loaded', apps.length, 'apps from Remnawave config');
      }
    } catch (e) {
      console.warn('[connect] Config fetch failed, using fallback:', e.message);
    }

    // 2. Fallback to hardcoded list
    if (!apps) {
      apps = FALLBACK_APPS[platform] || FALLBACK_APPS.windows;
      console.log('[connect] Using fallback apps for', platform);
    }

    // 3. Prioritize if app hint is given
    candidates = prioritize([...apps]);

    // 4. Start fun messages and begin trying
    startFunMessages();
    setTimeout(tryNext, 300);
  }

  main();

})();
</script>
</body>
