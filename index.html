<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zynerio VPN — Connect</title>
<style>
  :root {
    --bg: #0f0f14;
    --card: #1a1a24;
    --accent: #6c5ce7;
    --accent-hover: #7f70f0;
    --text: #e8e8ef;
    --muted: #8888a0;
    --success: #00b894;
    --warn: #fdcb6e;
    --danger: #e17055;
    --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    max-width: 420px;
    width: 100%;
    text-align: center;
  }
  .logo {
    font-size: 48px;
    margin-bottom: 8px;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 28px;
  }
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 28px 24px;
    margin-bottom: 16px;
  }
  .status {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 16px;
  }
  .spinner {
    width: 20px;
    height: 20px;
    border: 3px solid var(--muted);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-icon { font-size: 22px; }
  .attempt-list {
    text-align: left;
    margin: 16px 0 0;
    font-size: 13px;
    color: var(--muted);
  }
  .attempt-list .row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,.05);
  }
  .attempt-list .row:last-child { border-bottom: none; }
  .attempt-list .icon { width: 18px; text-align: center; }
  .attempt-list .active { color: var(--text); font-weight: 500; }
  .btn {
    display: inline-block;
    width: 100%;
    padding: 14px 24px;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    text-decoration: none;
    transition: background .2s, transform .1s;
    color: #fff;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--accent); }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary {
    background: transparent;
    border: 1px solid rgba(255,255,255,.12);
    color: var(--muted);
    margin-top: 10px;
    font-size: 13px;
    padding: 10px 20px;
  }
  .btn-secondary:hover { border-color: rgba(255,255,255,.25); color: var(--text); }
  .hidden { display: none !important; }
  .manual-section {
    margin-top: 20px;
    text-align: left;
  }
  .manual-section h3 {
    font-size: 14px;
    margin-bottom: 8px;
    color: var(--muted);
  }
  .key-box {
    background: rgba(255,255,255,.06);
    border-radius: 10px;
    padding: 12px;
    font-family: 'SF Mono', Monaco, Consolas, monospace;
    font-size: 11px;
    word-break: break-all;
    color: var(--muted);
    position: relative;
    cursor: pointer;
    max-height: 80px;
    overflow: hidden;
    transition: max-height .3s;
  }
  .key-box.expanded { max-height: 400px; }
  .copy-toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--success);
    color: #fff;
    padding: 10px 24px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    transition: opacity .3s;
    pointer-events: none;
    z-index: 100;
  }
  .copy-toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">🔐</div>
  <h1>Zynerio VPN</h1>
  <p class="subtitle" id="subtitle">Connecting to your VPN app…</p>

  <div class="card">
    <div class="status" id="status">
      <div class="spinner" id="spinner"></div>
      <span id="statusText">Loading config…</span>
    </div>
    <div class="attempt-list" id="attemptList"></div>
  </div>

  <!-- Shown when all attempts fail -->
  <div id="fallbackSection" class="hidden">
    <div id="storeButtons"></div>
    <button class="btn btn-secondary" onclick="copyKey()">
      📋 Copy subscription key
    </button>
  </div>

  <!-- Manual key section -->
  <div class="manual-section hidden" id="manualSection">
    <h3>Subscription key (tap to copy):</h3>
    <div class="key-box" id="keyBox" onclick="copyKey()"></div>
  </div>
</div>

<div class="copy-toast" id="copyToast">✅ Copied!</div>

<script>
(function() {
  'use strict';

  /* ── Config endpoint (proxied through Caddy to subscription-page) ── */

  const CONFIG_URL = '/add_sub/config';

  /* ── Hardcoded fallback (used when config fetch fails) ────────────── */

  const FALLBACK_APPS = {
    ios: [
      { name: 'Happ',         deepLink: 'happ://add/{{SUB}}',                                      storeLink: 'https://apps.apple.com/ru/app/happ-proxy-utility-plus/id6746188973' },
      { name: 'Streisand',    deepLink: 'streisand://import/{{SUB}}',                               storeLink: 'https://apps.apple.com/ru/app/streisand/id6450534064' },
      { name: 'Stash',        deepLink: 'stash://install-config?url={{ENC}}',                       storeLink: 'https://apps.apple.com/us/app/stash-rule-based-proxy/id1596063349' },
      { name: 'Shadowrocket', deepLink: 'shadowrocket://add/{{SUB}}',                              storeLink: 'https://apps.apple.com/ru/app/shadowrocket/id932747118' },
    ],
    android: [
      { name: 'Happ',         deepLink: 'happ://add/{{SUB}}',                                      storeLink: 'https://play.google.com/store/apps/details?id=com.happproxy' },
      { name: 'FlClashX',     deepLink: 'flclashx://install-config?url={{ENC}}',                    storeLink: 'https://github.com/pluralplay/FlClashX/releases/latest/download/FlClashX-android-universal.apk' },
      { name: 'Clash Meta',   deepLink: 'clashmeta://install-config?url={{ENC}}',                   storeLink: 'https://github.com/MetaCubeX/ClashMetaForAndroid/releases/download/v2.11.20/cmfa-2.11.20-meta-universal-release.apk' },
      { name: 'V2RayNG',      deepLink: 'v2rayng://install-config?url={{ENC}}',                     storeLink: 'https://github.com/2dust/v2rayNG/releases/latest' },
    ],
    macos: [
      { name: 'Happ',         deepLink: 'happ://add/{{SUB}}',                                      storeLink: 'https://apps.apple.com/ru/app/happ-proxy-utility-plus/id6746188973' },
      { name: 'FlClashX',     deepLink: 'flclashx://install-config?url={{ENC}}',                    storeLink: 'https://github.com/pluralplay/FlClashX/releases/latest' },
      { name: 'Koala Clash',  deepLink: 'koala-clash://install-config?url={{ENC}}',                 storeLink: 'https://github.com/coolcoala/clash-verge-rev-lite/releases/latest' },
    ],
    windows: [
      { name: 'Happ',         deepLink: 'happ://add/{{SUB}}',                                      storeLink: 'https://github.com/Happ-proxy/happ-desktop/releases/latest/download/setup-Happ.x64.exe' },
      { name: 'FlClashX',     deepLink: 'flclashx://install-config?url={{ENC}}',                    storeLink: 'https://github.com/pluralplay/FlClashX/releases/latest/download/FlClashX-windows-amd64-setup.exe' },
      { name: 'Koala Clash',  deepLink: 'koala-clash://install-config?url={{ENC}}',                 storeLink: 'https://github.com/coolcoala/clash-verge-rev-lite/releases/latest/download/Koala.Clash_x64-setup.exe' },
    ],
    linux: [
      { name: 'FlClashX',     deepLink: 'flclashx://install-config?url={{ENC}}',                    storeLink: 'https://github.com/pluralplay/FlClashX/releases/latest' },
      { name: 'Koala Clash',  deepLink: 'koala-clash://install-config?url={{ENC}}',                 storeLink: 'https://github.com/coolcoala/clash-verge-rev-lite/releases/latest' },
    ],
  };

  /* ── Parse URL params ──────────────────────────────────── */

  const params  = new URLSearchParams(window.location.search);
  const subUrl  = params.get('sub') || '';
  const appHint = (params.get('app') || '').toLowerCase();

  if (!subUrl) {
    document.getElementById('statusText').textContent = 'Error: no subscription URL';
    document.getElementById('spinner').classList.add('hidden');
    return;
  }

  /* ── Detect platform ───────────────────────────────────── */

  function detectPlatform() {
    const ua = navigator.userAgent.toLowerCase();
    if (/iphone|ipad|ipod/.test(ua)) return 'ios';
    if (/android/.test(ua))           return 'android';
    if (/macintosh|mac os/.test(ua))  return 'macos';
    if (/windows/.test(ua))           return 'windows';
    if (/linux/.test(ua))             return 'linux';
    return 'windows'; // safe desktop fallback
  }

  const platform = detectPlatform();

  /* ── Parse Remnawave subscription-page config ──────────── */

  function parseRemnaConfig(cfg) {
    // cfg is the full .app-config-v2.json
    // Structure: { platforms: { ios: { apps: [ { name, featured, blocks: [ { buttons: [...] } ] } ] } } }
    const platformCfg = cfg?.platforms?.[platform];
    if (!platformCfg?.apps?.length) return null;

    const apps = [];
    for (const app of platformCfg.apps) {
      const name = app.name || 'Unknown';
      let deepLink  = null;
      let storeLink = null;
      const storeLinks = [];

      for (const block of (app.blocks || [])) {
        for (const btn of (block.buttons || [])) {
          if (btn.type === 'subscriptionLink' && btn.link && !deepLink) {
            deepLink = btn.link;
          }
          if (btn.type === 'external' && btn.link) {
            if (!storeLink) storeLink = btn.link;
            storeLinks.push({ text: btn.text || 'Download', link: btn.link });
          }
        }
      }

      if (deepLink) {
        apps.push({ name, deepLink, storeLink, storeLinks, featured: !!app.featured });
      }
    }

    return apps.length ? apps : null;
  }

  /* ── Build URI from deep-link template ─────────────────── */

  function buildUri(template, sub) {
    return template
      .replace('{{SUBSCRIPTION_LINK}}', sub)
      .replace('{{USERNAME}}', '')
      .replace('{{HAPP_CRYPT3_LINK}}', sub)
      .replace('{{HAPP_CRYPT4_LINK}}', sub)
      .replace('{{SUB}}', sub)
      .replace('{{ENC}}', encodeURIComponent(sub));
  }

  /* ── Prioritize apps: move appHint match to front ──────── */

  function prioritize(apps) {
    if (!appHint || appHint === '_default') return apps;
    const hint = appHint.replace(/[-_\s]/g, '').toLowerCase();
    const idx = apps.findIndex(a =>
      a.name.replace(/[-_\s]/g, '').toLowerCase().includes(hint) ||
      hint.includes(a.name.replace(/[-_\s]/g, '').toLowerCase())
    );
    if (idx > 0) {
      const [match] = apps.splice(idx, 1);
      apps.unshift(match);
    }
    return apps;
  }

  /* ── DOM refs ──────────────────────────────────────────── */

  const listEl     = document.getElementById('attemptList');
  const statusText = document.getElementById('statusText');
  const spinner    = document.getElementById('spinner');

  /* ── Render attempt rows ───────────────────────────────── */

  function renderRows(apps) {
    listEl.innerHTML = '';
    apps.forEach((app, i) => {
      const row = document.createElement('div');
      row.className = 'row';
      row.id = 'row-' + i;
      row.innerHTML = '<span class="icon" id="icon-' + i + '">⏳</span><span>' + app.name + '</span>';
      listEl.appendChild(row);
    });
  }

  /* ── Deep-link attempt engine ──────────────────────────── */

  let currentIdx = 0;
  let appOpened  = false;
  let candidates = [];

  function setRowStatus(idx, icon, active) {
    const iconEl = document.getElementById('icon-' + idx);
    const rowEl  = document.getElementById('row-' + idx);
    if (iconEl) iconEl.textContent = icon;
    if (rowEl) rowEl.classList.toggle('active', !!active);
  }

  function onAppOpened(name) {
    appOpened = true;
    spinner.classList.add('hidden');
    statusText.innerHTML = '<span class="status-icon">✅</span> Opening ' + name + '…';
    document.getElementById('subtitle').textContent = 'Your VPN is being configured';
    setTimeout(() => {
      document.getElementById('manualSection').classList.remove('hidden');
      document.getElementById('keyBox').textContent = subUrl;
    }, 3000);
  }

  function onAllFailed() {
    spinner.classList.add('hidden');
    statusText.innerHTML = '<span class="status-icon">📲</span> No app detected';
    document.getElementById('subtitle').textContent = 'Install a VPN app to continue';

    document.getElementById('fallbackSection').classList.remove('hidden');
    document.getElementById('manualSection').classList.remove('hidden');
    document.getElementById('keyBox').textContent = subUrl;

    // Render download buttons for ALL apps with store links
    const container = document.getElementById('storeButtons');
    const seen = new Set();
    for (const app of candidates) {
      const links = app.storeLinks && app.storeLinks.length ? app.storeLinks : (app.storeLink ? [{ text: 'Download ' + app.name, link: app.storeLink }] : []);
      for (const sl of links) {
        if (seen.has(sl.link)) continue;
        seen.add(sl.link);
        const a = document.createElement('a');
        a.className = 'btn btn-primary';
        a.style.marginBottom = '8px';
        a.href = sl.link;
        a.target = '_blank';
        a.rel = 'noopener';
        a.textContent = '📥 ' + (sl.text || ('Download ' + app.name));
        container.appendChild(a);
      }
    }
    // If no store links at all, show generic
    if (!container.children.length) {
      const a = document.createElement('a');
      a.className = 'btn btn-primary';
      a.href = 'https://apps.apple.com/ru/app/happ-proxy-utility-plus/id6746188973';
      a.target = '_blank';
      a.textContent = '📥 Download Happ';
      container.appendChild(a);
    }
  }

  function tryNext() {
    if (appOpened || currentIdx >= candidates.length) {
      if (!appOpened) onAllFailed();
      return;
    }

    const app = candidates[currentIdx];
    const uri = buildUri(app.deepLink, subUrl);
    const idx = currentIdx;

    setRowStatus(idx, '🔄', true);
    statusText.textContent = 'Trying ' + app.name + '…';

    let detected = false;

    function onBlur() {
      detected = true;
      cleanup();
      setRowStatus(idx, '✅', true);
      onAppOpened(app.name);
    }
    function onVisChange() {
      if (document.hidden) {
        detected = true;
        cleanup();
        setRowStatus(idx, '✅', true);
        onAppOpened(app.name);
      }
    }
    function cleanup() {
      window.removeEventListener('blur', onBlur);
      document.removeEventListener('visibilitychange', onVisChange);
    }

    window.addEventListener('blur', onBlur);
    document.addEventListener('visibilitychange', onVisChange);

    // Try via hidden iframe
    const iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    iframe.src = uri;
    document.body.appendChild(iframe);

    // Also try window.location for platforms where iframe doesn't work
    setTimeout(() => {
      if (!detected && !appOpened) {
        window.location.href = uri;
      }
    }, 200);

    // Check result after timeout
    setTimeout(() => {
      cleanup();
      if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
      if (!detected && !appOpened) {
        setRowStatus(idx, '❌', false);
        currentIdx++;
        tryNext();
      }
    }, 1500);
  }

  /* ── Copy key helper ───────────────────────────────────── */

  window.copyKey = function() {
    navigator.clipboard.writeText(subUrl).then(() => {
      const toast = document.getElementById('copyToast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = subUrl;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
      const toast = document.getElementById('copyToast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    });
  };

  /* ── Main: fetch config → try deep-links ───────────────── */

  async function main() {
    let apps = null;

    // 1. Try to load dynamic config from Remnawave
    try {
      const res = await fetch(CONFIG_URL, { signal: AbortSignal.timeout(4000) });
      if (res.ok) {
        const cfg = await res.json();
        apps = parseRemnaConfig(cfg);
        if (apps) console.log('[connect] Loaded', apps.length, 'apps from Remnawave config');
      }
    } catch (e) {
      console.warn('[connect] Config fetch failed, using fallback:', e.message);
    }

    // 2. Fallback to hardcoded list
    if (!apps) {
      apps = FALLBACK_APPS[platform] || FALLBACK_APPS.windows;
      console.log('[connect] Using fallback apps for', platform);
    }

    // 3. Prioritize if app hint is given
    candidates = prioritize([...apps]);

    // 4. Render and start
    renderRows(candidates);
    statusText.textContent = 'Trying apps…';
    setTimeout(tryNext, 300);
  }

  main();

})();
</script>
</body>
</html>
