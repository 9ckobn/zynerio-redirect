      document.addEventListener('visibilitychange',onVis);
      try{window.location.href=uri}catch(e){}
      var tmr=setTimeout(function(){finish(false)},PROBE_TIMEOUT);
    });
  }

  var _waitApp=null,_waitApps=null,_connectClicked=false,_successPending=false;
  var _allApps=null;

  function hideAll(){$scan.classList.add('hidden');$success.classList.add('hidden');$list.classList.add('hidden');$wait.classList.add('hidden');$key.classList.add('hidden')}
  function showKeyBox(){$key.classList.remove('hidden');document.getElementById('keyBox').textContent=subUrl}

  function showSuccess(){
    stopFun();hideAll();
    $success.classList.remove('hidden');
    $sub.textContent='\u0413\u043E\u0442\u043E\u0432\u043E!';
    showKeyBox();
  }

  function showAppList(apps,skipScan){
    stopFun();hideAll();$list.classList.remove('hidden');
    if(skipScan){
      $sub.textContent='\u0412\u044B\u0431\u0435\u0440\u0438\u0442\u0435 \u043F\u0440\u0438\u043B\u043E\u0436\u0435\u043D\u0438\u0435';
      document.getElementById('listTitle').textContent='\u0412\u044B\u0431\u0435\u0440\u0438\u0442\u0435 \u043F\u0440\u0438\u043B\u043E\u0436\u0435\u043D\u0438\u0435';
      document.getElementById('listDetail').textContent='\u041D\u0430\u0436\u043C\u0438\u0442\u0435 \u00AB\u041F\u043E\u0434\u043A\u043B\u044E\u0447\u0438\u0442\u044C\u00BB \u043D\u0430\u043F\u0440\u043E\u0442\u0438\u0432 \u0432\u0430\u0448\u0435\u0433\u043E \u043F\u0440\u0438\u043B\u043E\u0436\u0435\u043D\u0438\u044F';
    }else{
      $sub.textContent='\u041F\u0440\u0438\u043B\u043E\u0436\u0435\u043D\u0438\u0435 \u043D\u0435 \u043D\u0430\u0439\u0434\u0435\u043D\u043E';
      document.getElementById('listTitle').textContent='\u041F\u0440\u0438\u043B\u043E\u0436\u0435\u043D\u0438\u0435 \u043D\u0435 \u043D\u0430\u0439\u0434\u0435\u043D\u043E';
      document.getElementById('listDetail').textContent='\u041D\u0430\u0436\u043C\u0438\u0442\u0435 \u00AB\u041F\u043E\u0434\u043A\u043B\u044E\u0447\u0438\u0442\u044C\u00BB \u0438\u043B\u0438 \u0441\u043A\u0430\u0447\u0430\u0439\u0442\u0435 \u043F\u0440\u0438\u043B\u043E\u0436\u0435\u043D\u0438\u0435';
    }
    renderApps(apps);showKeyBox();
  }

  function enterWaitMode(app,allApps){
    hideAll();$wait.classList.remove('hidden');
    var msg='\u041E\u0436\u0438\u0434\u0430\u0435\u043C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043A\u0443 '+app.name+'\u2026';
    $sub.textContent=msg;
    document.getElementById('wtTitle').textContent=msg;
    _waitApp=app;_waitApps=allApps;
  }
  function exitWaitMode(){_waitApp=null;if(_waitApps)showAppList(_waitApps,false)}
  document.getElementById('wtCancel').addEventListener('click',exitWaitMode);

  /* Re-detection: when page becomes visible again */
  document.addEventListener('visibilitychange',function(){
    if(document.visibilityState!=='visible'){
      if(_connectClicked){_successPending=true;_connectClicked=false}
      return;
    }
    if(_successPending){_successPending=false;showSuccess();return}
    if(_waitApp){
      var wa=_waitApp;
      setTimeout(function(){
        probeIframe(wa).then(function(d){
          if(d&&_waitApp===wa){_waitApp=null;_waitApps=null;showSuccess();return}
          probeHref(wa).then(function(d2){
            if(d2&&_waitApp===wa){_waitApp=null;_waitApps=null;showSuccess()}
          });
        });
      },600);
    }
  });
  window.addEventListener('pageshow',function(e){
    if(e.persisted){
      if(_waitApp){
        var wa=_waitApp;
        setTimeout(function(){
          probeIframe(wa).then(function(d){
            if(d){_waitApp=null;_waitApps=null;showSuccess();return}
            probeHref(wa).then(function(d2){
              if(d2){_waitApp=null;_waitApps=null;showSuccess()}
            });
          });
        },600);
      }else if(_allApps&&$success.classList.contains('hidden')){
        showAppList(_allApps,false);
      }
    }
  });

  /* App list: only FIRST app is recommended, rest in dropdown */
  function renderApps(apps){
    var c=document.getElementById('appCards');c.innerHTML='';
    if(!apps.length)return;
    c.appendChild(mkCard(apps[0],true,apps));
    if(apps.length>1){
      var rest=apps.slice(1);
      var togBtn=document.createElement('button');togBtn.className='btn-tog';togBtn.type='button';
      togBtn.textContent='\u0415\u0449\u0451 \u043F\u0440\u0438\u043B\u043E\u0436\u0435\u043D\u0438\u044F ('+rest.length+')';
      var wrap=document.createElement('div');wrap.className='hidden';var isOpen=false;
      togBtn.addEventListener('click',function(){
        isOpen=!isOpen;wrap.classList.toggle('hidden',!isOpen);
        togBtn.textContent=isOpen?'\u0421\u043A\u0440\u044B\u0442\u044C':'\u0415\u0449\u0451 \u043F\u0440\u0438\u043B\u043E\u0436\u0435\u043D\u0438\u044F ('+rest.length+')';
      });
      for(var i=0;i<rest.length;i++)wrap.appendChild(mkCard(rest[i],false,apps));
      c.appendChild(togBtn);c.appendChild(wrap);
    }
  }
  function mkCard(app,isRec,allApps){
    var card=document.createElement('div');card.className='ac'+(isRec?' feat':'');
    var top=document.createElement('div');top.className='ac-top';
    var nm=document.createElement('span');nm.className='ac-name';nm.textContent=app.name;top.appendChild(nm);
    if(isRec){var badge=document.createElement('span');badge.className='ac-badge';badge.textContent='\u0420\u0435\u043A\u043E\u043C\u0435\u043D\u0434\u0443\u0435\u043C';top.appendChild(badge)}
    card.appendChild(top);
    var btns=document.createElement('div');btns.className='ac-btns';
    if(app.storeLinks&&app.storeLinks.length){
      var dlBtn=document.createElement('button');dlBtn.className='btn btn-d';dlBtn.type='button';dlBtn.textContent='\u0421\u043A\u0430\u0447\u0430\u0442\u044C';
      dlBtn.addEventListener('click',(function(a){return function(){window.open(a.storeLinks[0].link,'_blank','noopener');enterWaitMode(a,allApps)}})(app));
      btns.appendChild(dlBtn);
    }
    var connBtn=document.createElement('button');connBtn.className='btn btn-c';connBtn.type='button';connBtn.textContent='\u041F\u043E\u0434\u043A\u043B\u044E\u0447\u0438\u0442\u044C';
    connBtn.addEventListener('click',(function(a){return function(){
      _connectClicked=true;
      window.location.href=buildLink(a.deepLink,subUrl);
      setTimeout(function(){_connectClicked=false},3000);
    }})(app));
    btns.appendChild(connBtn);card.appendChild(btns);
    if(app.storeLinks&&app.storeLinks.length>1){
      var dls=document.createElement('div');dls.className='dls';
      for(var i=0;i<app.storeLinks.length;i++){var dl=document.createElement('a');dl.className='dl';dl.href=app.storeLinks[i].link;dl.target='_blank';dl.rel='noopener';dl.textContent=app.storeLinks[i].text;dls.appendChild(dl)}
      card.appendChild(dls);
    }
    return card;
  }

  /* Copy */
  function doCopy(){if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(subUrl).then(showToast).catch(fallbackCopy)}else{fallbackCopy()}}
  function fallbackCopy(){var ta=document.createElement('textarea');ta.value=subUrl;ta.style.cssText='position:fixed;top:-999px';document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();showToast()}
  function showToast(){var el=document.getElementById('toast');el.textContent='\u2705 \u0421\u043A\u043E\u043F\u0438\u0440\u043E\u0432\u0430\u043D\u043E!';el.classList.add('show');setTimeout(function(){el.classList.remove('show')},2000)}
  document.getElementById('copyBtn').addEventListener('click',doCopy);
  document.getElementById('keyBox').addEventListener('click',doCopy);
  document.getElementById('retryBtn').addEventListener('click',function(){location.reload()});

  /*
   * Main: two passes on ALL devices
   * Pass 1 — hidden iframes (safe, silent everywhere)
   * Pass 2 — location.href (fallback; works on iOS Safari where iframes can't trigger custom schemes)
   */
  async function main(){
    startFun();
    var apps=null;
    try{var res=await fetch(CONFIG_URL,{signal:AbortSignal.timeout(4000)});if(res.ok){apps=parseRemnaConfig(await res.json());if(apps)console.log('[connect] Loaded',apps.length,'apps from config')}}catch(e){console.warn('[connect] Config fetch failed:',e.message)}
    if(!apps){apps=FALLBACK[platform]||FALLBACK.windows;console.log('[connect] Using fallback for',platform)}
    apps=prioritize(apps.slice());
    _allApps=apps;
    if(!apps.length){showAppList([],false);return}
    if(isFirefoxMobile){showAppList(apps,true);return}

    /* Pass 1: iframes */
    for(var i=0;i<apps.length;i++){
      $scanSub.textContent='\u041F\u0440\u043E\u0432\u0435\u0440\u044F\u0435\u043C '+apps[i].name+'\u2026';
      if(await probeIframe(apps[i])){showSuccess();return}
    }
    /* Pass 2: href */
    for(var i=0;i<apps.length;i++){
      $scanSub.textContent='\u041F\u0440\u043E\u0432\u0435\u0440\u044F\u0435\u043C '+apps[i].name+'\u2026';
      if(await probeHref(apps[i])){showSuccess();return}
    }
    showAppList(apps,false);
  }
  setTimeout(main,150);
})();
</script>
