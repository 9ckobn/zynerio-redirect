<title>Zynerio VPN — Connect</title>
<style>
  :root {
    --bg: #0f0f14;

    --card-border: rgba(255,255,255,.06);
    --accent: #6c5ce7;
    --accent-glow: rgba(108,92,231,.15);
    --text: #e8e8ef;
    --muted: #8888a0;
    --success: #00b894;
    --danger: #e17055;
    --radius: 16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100dvh; display: flex; align-items: center;
    justify-content: center; padding: 20px;
  }
  .container { max-width: 420px; width: 100%; }
  .header { text-align: center; margin-bottom: 24px; }
  .logo { font-size: 48px; margin-bottom: 8px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 14px; }
  .platform-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--accent-glow); color: var(--accent);
    padding: 6px 14px; border-radius: 20px;
    font-size: 13px; font-weight: 500; margin-top: 12px;
  }

  .card {
    background: var(--card); border-radius: var(--radius);
    padding: 28px 24px; margin-bottom: 16px;
    border: 1px solid var(--card-border);
  }

  /* Scan */
  .scan-status { text-align: center; margin-bottom: 16px; }
  .scan-emoji { font-size: 40px; margin-bottom: 12px; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
  .scan-msg { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .scan-detail { font-size: 13px; color: var(--muted); min-height: 18px; }
  .progress-wrap { background: rgba(255,255,255,.06); border-radius: 8px; height: 7px; overflow: hidden; margin: 16px 0; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), #a29bfe); border-radius: 8px; transition: width .4s ease; width: 0; }
  .attempt-list { text-align: left; }
  .attempt-row {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px; border-radius: 8px; font-size: 14px;
    color: var(--muted); transition: all .2s;
  }
  .attempt-row.active { color: var(--text); background: rgba(108,92,231,.07); font-weight: 500; }
  .attempt-row.found { color: var(--success); font-weight: 500; }
  .attempt-row.fail { opacity: .45; }
  .attempt-icon { width: 22px; text-align: center; font-size: 15px; }

  /* Result */
  .result-emoji { font-size: 48px; margin-bottom: 12px; text-align: center; }
  .result-msg { font-size: 18px; font-weight: 700; margin-bottom: 6px; text-align: center; }
  .result-hint { font-size: 13px; color: var(--muted); text-align: center; line-height: 1.5; }
  .result-btn {
    display: block; width: 100%; padding: 14px; margin-top: 16px;
    font-size: 15px; font-weight: 600; border: none; border-radius: 12px;
    cursor: pointer; color: #fff; text-align: center; text-decoration: none;
    background: linear-gradient(135deg, var(--success), #00a383);
    transition: transform .1s;
  }
  .result-btn:active { transform: scale(.97); }

  /* App cards */
  .app-card {
    background: rgba(255,255,255,.03); border-radius: 14px;
    padding: 16px; margin-bottom: 10px; text-align: left;
    border: 1px solid var(--card-border);
  }
  .app-card.top { border-color: rgba(108,92,231,.3); background: rgba(108,92,231,.05); }
  .app-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .app-name { font-size: 15px; font-weight: 600; }
  .app-tag {
    font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 8px;
    background: linear-gradient(135deg, rgba(108,92,231,.25), rgba(162,155,254,.2));
    color: #a29bfe;
  }
  .btn-row { display: flex; gap: 8px; }
  .btn-act {
    display: flex; align-items: center; justify-content: center; gap: 4px;
    flex: 1; padding: 11px; font-size: 14px; font-weight: 600;
    border: none; border-radius: 10px; cursor: pointer; color: #fff;
    text-decoration: none; text-align: center; transition: transform .1s;

  .btn-act:active { transform: scale(.96); }
  .btn-green { background: linear-gradient(135deg, var(--success), #00a383); }
  .btn-purple { background: rgba(108,92,231,.2); color: var(--accent); border: 1px solid rgba(108,92,231,.15); }
  .btn-purple:hover { background: rgba(108,92,231,.3); }
  .dl-links { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .dl-link {
    font-size: 12px; color: var(--muted); text-decoration: none;
    padding: 5px 12px; border-radius: 8px;
    background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.06);
    transition: all .2s;
  }
  .dl-link:hover { background: rgba(255,255,255,.08); color: var(--text); }
  .other-toggle {
    display: block; width: 100%; padding: 12px; font-size: 13px; font-weight: 500;
    border: 1px solid rgba(108,92,231,.15); border-radius: 12px;
    cursor: pointer; margin: 10px 0; background: transparent; color: var(--accent);
    transition: all .2s;
  }
  .other-toggle:hover { border-color: rgba(108,92,231,.4); background: rgba(108,92,231,.05); }

  /* Wait mode */
  .wait-emoji { font-size: 44px; text-align: center; margin-bottom: 12px; animation: pulse 2s infinite; }
  .wait-msg { font-size: 16px; font-weight: 600; text-align: center; margin-bottom: 6px; }
  .wait-hint { font-size: 13px; color: var(--muted); text-align: center; line-height: 1.5; margin-bottom: 16px; }
  .btn-cancel {
    display: block; margin: 0 auto; padding: 10px 28px; font-size: 13px; font-weight: 500;
    border: 1px solid rgba(255,255,255,.1); border-radius: 10px;
    cursor: pointer; background: transparent; color: var(--muted); transition: all .2s;
  }
  .btn-cancel:hover { border-color: rgba(255,255,255,.2); color: var(--text); }

  /* Key section */
  .key-section {
    background: var(--card); border-radius: var(--radius);
    padding: 16px; margin-top: 16px; text-align: center;
    border: 1px solid var(--card-border);
  }
  .btn-copy {
    display: block; width: 100%; padding: 12px; font-size: 14px; font-weight: 600;
    border: none; border-radius: 12px; cursor: pointer; color: #fff;
    background: var(--accent); transition: all .2s; margin-bottom: 10px;
  }
  .btn-copy:hover { background: #7f70f0; }
  .btn-copy:active { transform: scale(.97); }
  .key-box {
    background: rgba(255,255,255,.04); border-radius: 10px; padding: 10px;
    font-family: "SF Mono", Monaco, Consolas, monospace; font-size: 11px;
    word-break: break-all; color: var(--muted); cursor: pointer;
    max-height: 60px; overflow: hidden; border: 1px solid rgba(255,255,255,.06);
  }
  .copy-toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: var(--success); color: #fff; padding: 10px 24px;
    border-radius: 12px; font-size: 14px; font-weight: 500;
    opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 100;
    box-shadow: 0 4px 20px rgba(0,184,148,.3);
  }
  .copy-toast.show { opacity: 1; }
  .hidden { display: none !important; }

      if (!scheme) continue;
      var tpl = scheme + (scheme.charAt(scheme.length - 1) === "=" ? "{{ENC}}" : "{{SUB}}");
      var links = [];
      if (app.installationStep && app.installationStep.buttons) {
        for (var j = 0; j < app.installationStep.buttons.length; j++) {
          var btn = app.installationStep.buttons[j];
          if (btn.buttonLink) {
            var txt = (btn.buttonText && (btn.buttonText[lang] || btn.buttonText.en || btn.buttonText.ru)) || app.name;
            links.push({ text: txt, link: btn.buttonLink });
          }
        }
      }
      apps.push({ name: app.name || app.id, deepLink: tpl, featured: !!app.isFeatured, storeLinks: links });
    }
    apps.sort(function(a, b) { return (b.featured ? 1 : 0) - (a.featured ? 1 : 0); });
    return apps.length ? apps : null;
  }

  function prioritize(apps) {
    if (!appHint || appHint === "_default") return apps;
    var hint = appHint.replace(/[-_\s]/g, "").toLowerCase();
    for (var i = 1; i < apps.length; i++) {
      var n = apps[i].name.replace(/[-_\s]/g, "").toLowerCase();
      if (n.indexOf(hint) !== -1 || hint.indexOf(n) !== -1) {
        var m = apps.splice(i, 1)[0];
        apps.unshift(m);
        break;
      }
    }
    return apps;
  }

  /* ── Auto-detection ────────────────────────────────────── */
  /*
   * Uses iframe.src + blur + visibilitychange.
   *
   * blur handler: waits 200ms, then checks visibilityState.
   *   If "hidden" → app actually opened → detection confirmed.
   *   If "visible" → false positive (Firefox prompt, notification) → ignored.
   *
   * visibilitychange: direct check for hidden → detection confirmed.
   *
   * This combo works on Safari (blur fires when app opens)
   * and avoids Firefox false positives (blur from prompts doesn't set hidden).
   *
   * A SINGLE pair of handlers is registered before the scan starts.
   * currentApp is updated before each iframe.src to track attribution.
   */

  function scanApps(apps) {
    return new Promise(function(resolve) {
      var currentApp = null;
      var currentIdx = -1;
      var resolved = false;

      /* Fun messages rotation */
      var funMsgs = FUN[lang] || FUN.en;
      var funIdx = 0;
      var funTimer = setInterval(function() {
        funIdx = (funIdx + 1) % funMsgs.length;
        document.getElementById("scanMsg").textContent = funMsgs[funIdx];
      }, 2000);

      /* Build per-app status rows */
      var listEl = document.getElementById("attemptList");
      listEl.innerHTML = "";
      var rows = [];
      for (var s = 0; s < apps.length; s++) {
        var row = document.createElement("div");
        row.className = "attempt-row";
        var icon = document.createElement("span");
        icon.className = "attempt-icon";
        icon.textContent = "⏳";
        var name = document.createElement("span");
        name.textContent = apps[s].name;
        row.appendChild(icon);
        row.appendChild(name);
        listEl.appendChild(row);
        rows.push({ el: row, iconEl: icon });
      }

      function setRow(idx, emoji, cls) {
        if (idx < 0 || idx >= rows.length) return;
        rows[idx].iconEl.textContent = emoji;
        rows[idx].el.className = "attempt-row " + cls;
      }

      function finish(app) {
        if (resolved) return;
        resolved = true;
        clearInterval(funTimer);
        document.removeEventListener("visibilitychange", onVis);
        window.removeEventListener("blur", onBlur);
        if (app && currentIdx >= 0) setRow(currentIdx, "✅", "found");
        resolve(app);
      }

      function onVis() {
        if (document.visibilityState === "hidden" && currentApp && !resolved) {
          finish(currentApp);
        }
      }

      function onBlur() {
        if (resolved) return;
        var capturedApp = currentApp;
        var capturedIdx = currentIdx;
        setTimeout(function() {
          if (!resolved && document.visibilityState === "hidden" && capturedApp) {
            currentApp = capturedApp;
            currentIdx = capturedIdx;
            finish(capturedApp);
          }
        }, 200);
      }

      /* Register ONCE before scanning */
      document.addEventListener("visibilitychange", onVis);
      window.addEventListener("blur", onBlur);

      function tryApp(i) {
        if (i >= apps.length || resolved) {
          /* Mark remaining as not found */
          for (var r = (resolved ? i : 0); r < apps.length; r++) {
            if (rows[r].el.className.indexOf("found") === -1) setRow(r, "❌", "fail");
          }
          if (!resolved) finish(null);
          return;
        }

        /* Mark previous as failed */
        if (i > 0 && !resolved) setRow(i - 1, "❌", "fail");

        /* Activate current */
        currentApp = apps[i];
        currentIdx = i;
        setRow(i, "🔄", "active");

        var uri = buildUri(currentApp.deepLink, subUrl);
        var pct = Math.round(((i + 1) / apps.length) * 100);
        document.getElementById("scanDetail").textContent = t("trying", { name: currentApp.name });
        document.getElementById("progressBar").style.width = pct + "%";

        /* Create hidden iframe to trigger URL scheme */
        var iframe = document.createElement("iframe");
        iframe.style.cssText = "display:none;width:0;height:0;border:0;position:absolute;top:-9999px";
        document.body.appendChild(iframe);
        try { iframe.src = uri; } catch (e) { /* ignore */ }

        setTimeout(function() {
          if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
          if (!resolved) tryApp(i + 1);
        }, SCAN_TIMEOUT);
      }

      tryApp(0);
    });
  }

  /* ── Show success ──────────────────────────────────────── */

  function showSuccess(app) {
    document.getElementById("scanCard").classList.add("hidden");
    var rc = document.getElementById("resultCard");
    rc.classList.remove("hidden");
    rc.style.borderColor = "rgba(0,184,148,.3)";
    document.getElementById("resultEmoji").textContent = "✅";
    document.getElementById("resultMsg").textContent = t("found", { name: app.name });
    document.getElementById("resultHint").textContent = t("foundHint");

    var btn = document.createElement("a");
    btn.className = "result-btn";
    btn.href = buildUri(app.deepLink, subUrl);
    btn.textContent = t("openApp", { name: app.name });
    document.getElementById("resultActions").appendChild(btn);

    showKey();
  }

  /* ── Show failure (app list) ───────────────────────────── */

  function showFailure(apps) {
    document.getElementById("scanCard").classList.add("hidden");
    var rc = document.getElementById("resultCard");
    rc.classList.remove("hidden");
    document.getElementById("resultEmoji").textContent = "📲";
    document.getElementById("resultMsg").textContent = t("notFound");
    document.getElementById("resultHint").textContent = t("notFoundHint");

    renderAppList(apps);
    showKey();
  }

  /* ── Skip scan (Firefox mobile) ────────────────────────── */

  function showSkipScan(apps) {
    document.getElementById("scanCard").classList.add("hidden");
    var rc = document.getElementById("resultCard");
    rc.classList.remove("hidden");
    document.getElementById("resultEmoji").textContent = "📱";
    document.getElementById("resultMsg").textContent = t("skipScan");
    document.getElementById("resultHint").textContent = t("skipHint");

    renderAppList(apps);
    showKey();
  }

  /* ── Render app list ───────────────────────────────────── */

  function renderAppList(apps) {
    var listEl = document.getElementById("appList");
    listEl.classList.remove("hidden");
    listEl.innerHTML = "";

    var top = [];
    var other = [];
    for (var i = 0; i < apps.length; i++) {
      if (apps[i].featured) top.push(apps[i]);
      else other.push(apps[i]);
    }
    if (!top.length) { top.push(apps[0]); other = apps.slice(1); }

    for (var f = 0; f < top.length; f++) {
      listEl.appendChild(makeCard(top[f], f === 0));
    }

    if (other.length) {
      var togBtn = document.createElement("button");
      togBtn.className = "other-toggle";
      togBtn.textContent = t("otherApps", { count: other.length });
      togBtn.type = "button";
      var otherWrap = document.createElement("div");
      otherWrap.className = "hidden";
      var shown = false;
      togBtn.addEventListener("click", function() {
        shown = !shown;
        otherWrap.classList.toggle("hidden", !shown);
        togBtn.textContent = shown ? t("hideApps") : t("otherApps", { count: other.length });
      });
      listEl.appendChild(togBtn);
      for (var o = 0; o < other.length; o++) {
        otherWrap.appendChild(makeCard(other[o], false));
      }
      listEl.appendChild(otherWrap);
    }
  }

  /* ── Make app card ─────────────────────────────────────── */

  function makeCard(app, isTop) {
    var card = document.createElement("div");
    card.className = "app-card" + (isTop ? " top" : "");

    var head = document.createElement("div");
    head.className = "app-head";
    var nm = document.createElement("span");
    nm.className = "app-name";
    nm.textContent = app.name;
    head.appendChild(nm);
    if (isTop) {
      var tag = document.createElement("span");
      tag.className = "app-tag";
      tag.textContent = t("recommended");
      head.appendChild(tag);
    }
    card.appendChild(head);

    var row = document.createElement("div");
    row.className = "btn-row";

    if (app.storeLinks && app.storeLinks.length) {
      var dlBtn = document.createElement("button");
      dlBtn.className = "btn-act btn-purple";
      dlBtn.type = "button";
      dlBtn.textContent = t("download");
      dlBtn.addEventListener("click", (function(a) {
        return function() {
          window.open(a.storeLinks[0].link, "_blank", "noopener");
          enterWaitMode(a);
        };
      })(app));
      row.appendChild(dlBtn);
    }

    var connBtn = document.createElement("a");
    connBtn.className = "btn-act btn-green";
    connBtn.href = buildUri(app.deepLink, subUrl);
    connBtn.textContent = t("connect");
    row.appendChild(connBtn);
    card.appendChild(row);

    if (app.storeLinks && app.storeLinks.length > 1) {
      var dl = document.createElement("div");
      dl.className = "dl-links";
      for (var i = 0; i < app.storeLinks.length; i++) {
        var a = document.createElement("a");
        a.className = "dl-link";
        a.href = app.storeLinks[i].link;
        a.target = "_blank";
        a.rel = "noopener";
        a.textContent = app.storeLinks[i].text;
        dl.appendChild(a);
      }
      card.appendChild(dl);
    }

    return card;
  }

  /* ── Wait mode ─────────────────────────────────────────── */

  var _waitApp = null;
  var _waitTimer = null;

  function enterWaitMode(app) {
    _waitApp = app;

    document.getElementById("resultCard").classList.add("hidden");
    document.getElementById("appList").classList.add("hidden");
    document.getElementById("keySection").classList.add("hidden");

    var wc = document.getElementById("waitCard");
    wc.classList.remove("hidden");
    document.getElementById("waitMsg").textContent = t("waiting", { name: app.name });
    document.getElementById("waitHint").textContent = t("waitHint");
  }

  function exitWaitMode() {
    _waitApp = null;
    if (_waitTimer) { clearTimeout(_waitTimer); _waitTimer = null; }
    document.getElementById("waitCard").classList.add("hidden");
  }

  document.getElementById("waitCancel").addEventListener("click", function() {
    var app = _waitApp;
    exitWaitMode();
    /* Restore the failure view */
    document.getElementById("resultCard").classList.remove("hidden");
    document.getElementById("appList").classList.remove("hidden");
    showKey();
  });

  /* Try detecting a single app (used in wait mode) */
  function tryDetectSingle(app) {
    if (!app) return;
    var uri = buildUri(app.deepLink, subUrl);
    var detected = false;

    function onVis() {
      if (document.visibilityState === "hidden" && !detected) {
        detected = true;
        cleanup();
        exitWaitMode();
        showSuccess(app);
      }
    }
    function onBlur() {
      if (detected) return;
      setTimeout(function() {
        if (!detected && document.visibilityState === "hidden") {
          detected = true;
          cleanup();
          exitWaitMode();
          showSuccess(app);
        }
      }, 200);
    }
    function cleanup() {
      document.removeEventListener("visibilitychange", onVis);
      window.removeEventListener("blur", onBlur);
      if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
      clearTimeout(failTimer);
    }

    document.addEventListener("visibilitychange", onVis);
    window.addEventListener("blur", onBlur);

    var iframe = document.createElement("iframe");
    iframe.style.cssText = "display:none;width:0;height:0;border:0;position:absolute;top:-9999px";
    document.body.appendChild(iframe);
    try { iframe.src = uri; } catch (e) { /* ignore */ }

    var failTimer = setTimeout(function() {
      if (!detected) {
        cleanup();
        /* Stay in wait mode, will retry on next visibility/focus */
      }
    }, SCAN_TIMEOUT);
  }

  /* Re-detect when user returns to page (from App Store etc) */
  document.addEventListener("visibilitychange", function() {
    if (document.visibilityState === "visible" && _waitApp) {
      setTimeout(function() { tryDetectSingle(_waitApp); }, 500);
    }
  });
  window.addEventListener("pageshow", function(ev) {
    if (_waitApp) {
      setTimeout(function() { tryDetectSingle(_waitApp); }, 500);
    } else if (ev.persisted && _scanDone) {
      main();
    }
  });

  /* ── Key section & copy ────────────────────────────────── */

  function showKey() {
    var ks = document.getElementById("keySection");
    ks.classList.remove("hidden");
    document.getElementById("keyBox").textContent = subUrl;
  }

  function doCopy() {
    navigator.clipboard.writeText(subUrl).then(showToast).catch(function() {
      var ta = document.createElement("textarea");
      ta.value = subUrl;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      ta.remove();
      showToast();
    });
  }

  function showToast() {
    var toast = document.getElementById("copyToast");
    toast.classList.add("show");
    setTimeout(function() { toast.classList.remove("show"); }, 2000);
  }

  document.getElementById("copyBtn").addEventListener("click", doCopy);
  document.getElementById("keyBox").addEventListener("click", doCopy);

  /* ── Main ──────────────────────────────────────────────── */

  var _running = false;
  var _scanDone = false;
  var _loadedApps = null;

  async function main() {
    if (_running) return;
    _running = true;

    /* Reset UI */
    document.getElementById("scanCard").classList.remove("hidden");
    document.getElementById("resultCard").classList.add("hidden");
    document.getElementById("appList").classList.add("hidden");
    document.getElementById("keySection").classList.add("hidden");
    document.getElementById("waitCard").classList.add("hidden");
    document.getElementById("progressBar").style.width = "0";
    document.getElementById("scanMsg").textContent = t("scanning");
    document.getElementById("scanDetail").textContent = "";
    document.getElementById("attemptList").innerHTML = "";

    /* Load app config */
    var apps = null;
    try {
      var res = await fetch(CONFIG_URL, { signal: AbortSignal.timeout(4000) });
      if (res.ok) {
        apps = parseRemnaConfig(await res.json());
        if (apps) console.log("[connect] Loaded", apps.length, "apps from config");
      }
    } catch (e) {
      console.warn("[connect] Config fetch failed, using fallback:", e.message);
    }
    if (!apps) {
      apps = FALLBACK_APPS[platform] || FALLBACK_APPS.windows;
      console.log("[connect] Using fallback for", platform);
    }
    apps = prioritize(apps.slice());
    _loadedApps = apps;

    /* Firefox mobile: skip scan to avoid annoying prompts */
    if (isFirefoxMobile) {
      showSkipScan(apps);
      _running = false;
      _scanDone = true;
      return;
    }

    var foundApp = await scanApps(apps);
    _scanDone = true;

    if (foundApp) {
      showSuccess(foundApp);
    } else {
      showFailure(apps);
    }
    _running = false;
  }

  main();
})();
</script>
</body>
</html>
