services:
  connect:
    container_name: ${CONTAINER_NAME:-zynerio_connect}
    image: caddy:2-alpine
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./index.html:/srv/index.html:ro
    ports:
      - "${PORT:-8070}:8080"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.10'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
